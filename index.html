<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClientFlow Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      :root {
        --bg: #020b18;
        --sidebar: #071323;
        --panel: rgba(13, 25, 44, 0.86);
        --panel-2: rgba(17, 32, 55, 0.92);
        --border: rgba(126, 151, 190, 0.18);
        --text: #f6f8ff;
        --muted: #aeb8cb;
        --soft: #758299;
        --blue: #6b91ff;
        --purple: #a985ff;
        --green: #56df9a;
        --yellow: #ffba35;
        --danger: #ff3d55;
        --button: #2a3978;
        --button-hover: #33458d;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 20% 0%,
            rgba(56, 88, 160, 0.22),
            transparent 32%
          ),
          radial-gradient(
            circle at 90% 20%,
            rgba(79, 39, 145, 0.16),
            transparent 30%
          ),
          linear-gradient(180deg, #05101f 0%, #020812 100%);
      }

      body.locked .app {
        display: none;
      }

      body.logged-in .login-screen {
        display: none;
      }

      .login-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at 50% 0%,
            rgba(107, 145, 255, 0.2),
            transparent 35%
          ),
          linear-gradient(180deg, #05101f 0%, #020812 100%);
      }

      .login-card {
        width: min(430px, 100%);
        padding: 34px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(9, 20, 37, 0.92);
        box-shadow: var(--shadow);
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 13px;
        margin-bottom: 28px;
        font-size: 24px;
        font-weight: 800;
      }

      .login-card h1 {
        margin: 0 0 8px;
        font-size: 30px;
        letter-spacing: -0.04em;
      }

      .login-card p {
        margin: 0 0 26px;
        color: var(--muted);
        line-height: 1.5;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .field label {
        color: #d9e0ef;
        font-size: 14px;
        font-weight: 600;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: rgba(5, 15, 28, 0.95);
        color: var(--text);
        font: inherit;
        padding: 0 15px;
        outline: none;
      }

      .field input,
      .field select {
        height: 52px;
      }

      .field textarea {
        min-height: 132px;
        padding: 14px 15px;
        resize: vertical;
        line-height: 1.5;
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: rgba(107, 145, 255, 0.65);
        box-shadow: 0 0 0 3px rgba(107, 145, 255, 0.12);
      }

      .login-btn {
        width: 100%;
        height: 54px;
        margin-top: 8px;
        border: 1px solid rgba(138, 159, 255, 0.18);
        border-radius: 9px;
        background: linear-gradient(180deg, #344383, #26366f);
        color: white;
        font: inherit;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .login-btn:hover {
        background: linear-gradient(180deg, #40519a, #304182);
      }

      .login-error {
        min-height: 22px;
        margin-top: 15px;
        color: #ff7b8b;
        font-size: 14px;
        font-weight: 500;
      }

      .app {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 22px 24px;
        background: rgba(5, 15, 28, 0.92);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 22px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: rgba(107, 145, 255, 0.65) rgba(255, 255, 255, 0.05);
      }

      .sidebar::-webkit-scrollbar {
        width: 8px;
      }

      .sidebar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 999px;
      }

      .sidebar::-webkit-scrollbar-thumb {
        background: rgba(107, 145, 255, 0.65);
        border-radius: 999px;
      }

      .sidebar::-webkit-scrollbar-thumb:hover {
        background: rgba(107, 145, 255, 0.9);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        font-size: 22px;
        flex-shrink: 0;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 9px;
        background:
          linear-gradient(135deg, #7ea0ff 0 45%, transparent 45%),
          linear-gradient(225deg, #385cf4 0 45%, transparent 45%),
          linear-gradient(315deg, #8d65ff 0 45%, transparent 45%);
        box-shadow: 0 10px 30px rgba(91, 123, 255, 0.35);
        flex-shrink: 0;
      }

      .section-title {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin: 8px 0 8px;
      }

      .quick-actions,
      .nav {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .action,
      .nav-item {
        width: 100%;
        border: 1px solid var(--border);
        background: rgba(19, 34, 58, 0.7);
        color: var(--text);
        border-radius: 9px;
        padding: 13px 14px;
        display: flex;
        align-items: center;
        gap: 13px;
        font: inherit;
        cursor: pointer;
        transition: 0.2s ease;
        text-align: left;
      }

      .action:hover,
      .nav-item:hover {
        background: rgba(40, 61, 98, 0.75);
        transform: translateY(-1px);
      }

      .action svg,
      .nav-item svg {
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
      }

      .chevron {
        margin-left: auto;
        color: var(--muted);
        font-size: 24px;
        line-height: 0;
      }

      .nav {
        border-top: 1px solid var(--border);
        padding-top: 16px;
        flex-shrink: 0;
      }

      .nav-item {
        border-color: transparent;
        background: transparent;
        color: #c8d0df;
      }

      .nav-item.active {
        color: var(--blue);
        border-color: rgba(107, 145, 255, 0.28);
        background: linear-gradient(
          90deg,
          rgba(55, 91, 170, 0.55),
          rgba(44, 57, 105, 0.35)
        );
      }

      .profile {
        border-top: 1px solid var(--border);
        padding-top: 18px;
        padding-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .avatar {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f0b18d, #5e3321);
        color: #111;
        font-weight: 800;
        border: 2px solid rgba(255, 255, 255, 0.18);
        flex-shrink: 0;
      }

      .profile strong {
        display: block;
        font-size: 15px;
      }

      .profile span {
        color: var(--muted);
        font-size: 13px;
      }

      .logout-btn {
        width: 100%;
        height: 44px;
        border: 1px solid rgba(255, 61, 85, 0.25);
        border-radius: 9px;
        background: rgba(255, 61, 85, 0.08);
        color: #ff9aa6;
        font: inherit;
        cursor: pointer;
        flex-shrink: 0;
      }

      .logout-btn:hover {
        background: rgba(255, 61, 85, 0.14);
      }

      main {
        padding: 24px 58px 50px 34px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 44px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 31px;
        letter-spacing: -0.04em;
      }

      .welcome {
        color: var(--muted);
        font-size: 18px;
        margin: 0;
      }

      .tools {
        display: flex;
        align-items: center;
        gap: 22px;
      }

      .search {
        width: min(420px, 40vw);
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: rgba(9, 20, 37, 0.85);
        color: var(--muted);
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      .search input::placeholder {
        color: #9da8ba;
      }

      .bell {
        position: relative;
        color: #cfd7e7;
      }

      .bell svg {
        width: 30px;
        height: 30px;
      }

      .badge {
        position: absolute;
        right: -8px;
        top: -8px;
        width: 21px;
        height: 21px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--danger);
        color: white;
        font-size: 12px;
        font-weight: 800;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
        grid-auto-rows: 118px;
        grid-auto-flow: dense;
        gap: 18px;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .card {
        min-height: 118px;
        height: 118px;
        padding: 18px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background:
          linear-gradient(
            145deg,
            rgba(18, 31, 55, 0.92),
            rgba(7, 17, 32, 0.94)
          ),
          var(--panel);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        transition: 0.2s ease;
        overflow: hidden;
        cursor: pointer;
      }

      .card.dragging {
        opacity: 0.58;
        transform: scale(0.99);
      }

      .card.drop-before {
        box-shadow:
          -4px 0 0 var(--blue),
          var(--shadow);
      }

      .card.drop-after {
        box-shadow:
          4px 0 0 var(--blue),
          var(--shadow);
      }

      .card:hover {
        transform: translateY(-3px);
        border-color: rgba(107, 145, 255, 0.35);
      }

      .icon-box {
        width: 58px;
        height: 58px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(135, 160, 208, 0.25);
        background: rgba(8, 19, 35, 0.58);
        margin-bottom: 18px;
      }

      .icon-box svg,
      .icon-box i {
        width: 31px;
        height: 31px;
        display: grid;
        place-items: center;
        font-size: 29px;
        line-height: 1;
      }

      .card h2 {
        margin: 0;
        font-size: clamp(17px, 1.55vw, 22px);
        letter-spacing: -0.03em;
        line-height: 1.14;
        text-align: left;
        overflow-wrap: anywhere;
      }

      .card h2.long-title {
        font-size: clamp(15px, 1.35vw, 19px);
      }

      .card h2.very-long-title {
        font-size: clamp(13px, 1.2vw, 16px);
      }

      .type {
        color: var(--blue);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 0;
        text-align: left;
      }

      .desc {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
        margin: 0;
        display: none;
      }

      .status {
        position: absolute;
        top: 50px;
        right: 10px;
        width: fit-content;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #dce5ff;
        font-size: 13px;
        font-weight: 700;
        padding: 8px 12px;
        border: 1px solid rgba(126, 151, 190, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.055);
      }

      .card-summary {
        display: grid;
        grid-template-columns: 64px 1fr;
        align-items: center;
        gap: 14px;
        min-height: 66px;
        padding-right: 38px;
      }

      .card-summary .icon-box {
        margin: 0;
      }

      .card-title-stack {
        display: grid;
        justify-items: start;
        gap: 6px;
        min-width: 0;
      }

      .card-divider {
        height: 1px;
        margin: 13px 0 0;
        background: rgba(126, 151, 190, 0.12);
      }

      .card-toggle-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        border: 1px solid rgba(138, 159, 255, 0.18);
        border-radius: 9px;
        background: rgba(19, 34, 58, 0.74);
        color: white;
        cursor: pointer;
        z-index: 2;
      }

      .card {
        position: relative;
      }

      .card.expanded .desc {
        display: block;
        max-height: 112px;
        overflow: hidden;
      }

      .card.expanded {
        grid-row: span 3;
        height: 100%;
        min-height: 0;
        padding: 27px;
      }

      .card.expanded .card-summary {
        display: block;
        min-height: 0;
      }

      .card.expanded .card-title-stack {
        display: block;
        justify-items: start;
      }

      .card.expanded .card-summary .icon-box {
        width: 70px;
        height: 70px;
        margin-bottom: 26px;
      }

      .card.expanded .card-summary .icon-box svg,
      .card.expanded .card-summary .icon-box i {
        width: 38px;
        height: 38px;
        font-size: 36px;
      }

      .card.expanded h2 {
        margin: 0 0 8px;
        font-size: 27px;
        text-align: left;
      }

      .card.expanded .type {
        text-align: left;
        font-size: 18px;
        margin-bottom: 10px;
      }

      .card.expanded .card-divider {
        display: none;
      }
      .card.expanded .desc.overflowing {
        color: #dce5ff;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--blue);
      }

      .dot.yellow {
        background: var(--yellow);
      }
      .dot.purple {
        background: var(--purple);
      }
      .dot.cyan {
        background: #62c6d7;
      }
      .dot.green {
        background: #66d48a;
      }
      .dot.danger {
        background: var(--danger);
      }

      .open-btn {
        margin-top: 14px;
        width: 100%;
        height: 54px;
        border: 1px solid rgba(138, 159, 255, 0.18);
        border-radius: 7px;
        background: linear-gradient(180deg, #344383, #26366f);
        color: white;
        font: inherit;
        font-size: 17px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .open-btn:hover {
        background: linear-gradient(180deg, #40519a, #304182);
      }

      .add-project-card {
        height: 118px;
        min-height: 118px;
        border-radius: var(--radius);
        border: 1px dashed rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.055);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.82);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .add-project-card:hover {
        border-color: rgba(107, 145, 255, 0.48);
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-3px);
      }

      .add-project-plus {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1px dashed rgba(255, 255, 255, 0.38);
        background: rgba(255, 255, 255, 0.06);
      }

      .add-project-plus svg {
        width: 34px;
        height: 34px;
      }

      .card-delete-btn {
        align-self: flex-end;
        width: 42px;
        height: 42px;
        margin: -8px -8px 8px 0;
        border-radius: 9px;
        display: grid;
        place-items: center;
      }

      .project-page {
        display: grid;
        gap: 22px;
      }

      .project-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 22px;
        margin-bottom: 8px;
      }

      .project-heading {
        min-width: 0;
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .project-heading .icon-box {
        margin: 0;
        flex: 0 0 auto;
      }

      .project-title-input {
        width: min(620px, 100%);
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.04em;
        padding: 0;
      }

      .project-title-input:focus {
        color: white;
        text-shadow: 0 0 26px rgba(107, 145, 255, 0.26);
      }

      .back-btn,
      .small-btn,
      .add-block-btn,
      .control-btn,
      .picker-option,
      .icon-category,
      .icon-choice,
      .color-swatch,
      .icon-page-button,
      .icon-page-number,
      .format-choice,
      .check-toggle {
        border: 1px solid rgba(138, 159, 255, 0.18);
        border-radius: 7px;
        color: white;
        font: inherit;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .back-btn,
      .small-btn,
      .add-block-btn {
        background: linear-gradient(180deg, #344383, #26366f);
      }

      .back-btn {
        min-width: 132px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }

      .small-btn {
        min-height: 38px;
        padding: 0 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .add-block-btn {
        height: 48px;
        padding: 0 18px;
        font-weight: 600;
        justify-self: start;
      }

      .back-btn:hover,
      .small-btn:hover,
      .add-block-btn:hover,
      .control-btn:hover,
      .picker-option:hover,
      .icon-category:hover,
      .icon-choice:hover,
      .icon-page-button:hover,
      .icon-page-number:hover,
      .format-choice:hover {
        background: linear-gradient(180deg, #40519a, #304182);
      }

      .back-btn svg,
      .back-btn i,
      .small-btn svg,
      .small-btn i,
      .add-block-btn svg,
      .add-block-btn i,
      .copy-button svg,
      .copy-button i,
      .control-btn svg,
      .control-btn i,
      .picker-option svg,
      .picker-option i,
      .icon-choice svg,
      .icon-choice i,
      .check-toggle svg,
      .check-toggle i {
        width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .small-btn.danger {
        border-color: rgba(255, 61, 85, 0.25);
        background: rgba(255, 61, 85, 0.08);
        color: #ff9aa6;
      }

      .small-btn.danger:hover {
        background: rgba(255, 61, 85, 0.14);
      }

      .project-status-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        color: #c8d0df;
        font-size: 15px;
      }

      .save-state {
        margin-left: 4px;
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
      }

      .project-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }

      .project-panel {
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background:
          linear-gradient(
            145deg,
            rgba(18, 31, 55, 0.92),
            rgba(7, 17, 32, 0.94)
          ),
          var(--panel);
        box-shadow: var(--shadow);
        padding: 26px;
      }

      .project-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(240px, 1fr));
        gap: 20px;
      }

      .project-form-grid .wide {
        grid-column: 1 / -1;
      }

      .inline-editor {
        display: grid;
        grid-template-columns: minmax(160px, 260px) minmax(160px, 260px) 70px;
        gap: 16px;
        align-items: end;
      }

      .icon-preview {
        width: 70px;
        height: 70px;
        margin: 0;
      }

      .copy-section {
        display: grid;
        gap: 16px;
      }

      .copy-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .copy-section h2,
      .project-panel h2 {
        margin: 0 0 18px;
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      .copy-section h2 {
        margin: 0;
      }

      .add-menu-wrap {
        position: relative;
        display: inline-flex;
      }

      .add-menu-wrap .custom-menu {
        min-width: 210px;
        left: auto;
        right: 0;
        top: calc(100% + 8px);
      }

      /* =========================
       Copy Blocks
    ========================= */

      .copy-block {
        min-height: 150px;

      .copy-preview {
        min-height: 52px;
        max-height: 64px;
        color: var(--muted);
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        overflow: hidden;
        cursor: text;
        user-select: text;
        font-size: 14px;
      }

      .copy-preview.collapsed {
        display: -webkit-box;
        -webkit-line-clamp: 4;
        line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .copy-preview.expanded {
        max-height: none;
        overflow: visible;
      }

      /* URL preview */

      .copy-preview.url {
        min-height: 42px;
        max-height: 42px;
        display: inline-flex;
        align-items: center;
        width: 100%;
        min-width: 0;
        color: #dce5ff;
        text-decoration: none;
        padding: 9px 12px;
        border: 1px solid rgba(126, 151, 190, 0.18);
        border-radius: 9px;
        background: rgba(5, 15, 28, 0.95);
      }

      .copy-preview.url span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .copy-preview.url:hover {
        border-color: rgba(107, 145, 255, 0.52);
        background: rgba(19, 34, 58, 0.9);
      }

      /* Code preview */

      .copy-preview.code {
        min-height: 118px;
        max-height: 138px;
        padding: 15px 15px 34px;
        border: 1px solid rgba(126, 151, 190, 0.18);
        border-radius: 9px;
        background: rgba(5, 15, 28, 0.95);
        color: #dce5ff;
        font-family:

        font-size: 14px;

      .copy-preview.code.expanded {
        max-height: none;
        overflow: visible;
      }

      .copy-preview.code.code-with-expand {
        padding-right: 64px;
      }

      .code-preview-wrap {
        position: relative;
      }

      .code-preview-wrap.code-collapsed::after {
        content: "";
        position: absolute;
        left: 1px;
        right: 1px;
        bottom: 1px;
        height: 44px;
        border-radius: 0 0 9px 9px;
        background: linear-gradient(

          rgba(5, 15, 28, 0),
          rgba(0, 0, 0, 0.92)

        pointer-events: none;
        z-index: 1;

      .code-expand-button {

        right: 10px;

        height: 34px;

        font-size: 18px;

          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");

      function cleanProject(project, fallback) {
        const cleaned = { ...fallback, ...project };
        cleaned.id = cleaned.id || uid();
        cleaned.title = cleaned.title || "Untitled Project";
        cleaned.task = TASK_OPTIONS.includes(cleaned.task)
          ? cleaned.task
          : "Other";
        cleaned.customTask = cleaned.customTask || "";
        cleaned.description = cleaned.description || "";
        cleaned.status = STATUS_OPTIONS.includes(cleaned.status)
          ? cleaned.status
          : "Pending";
        cleaned.icon = ICON_OPTIONS.includes(normalizeIconValue(cleaned.icon))
          ? normalizeIconValue(cleaned.icon)
          : "solid:file-lines";
        cleaned.color = COLOR_OPTIONS.some(
          (color) => color.id === cleaned.color,
        )
          ? cleaned.color
          : "blue";
        cleaned.copyBlocks = Array.isArray(cleaned.copyBlocks)
          ? cleaned.copyBlocks.map(cleanBlock)
          : [];
        cleaned.noteBlocks = Array.isArray(cleaned.noteBlocks)
          ? cleaned.noteBlocks.map(cleanNoteBlock)
          : [];
        return cleaned;
      }

      function cleanBlock(block) {
        const format = ["text", "code", "url"].includes(block.format)
          ? block.format
          : "text";

        return {
          id: block.id || uid(),
          label: block.label || "Copy Block",
          content: block.content || "",
          visibleText: block.visibleText || "",
          url: block.url || "",
          format,
          expanded: Boolean(block.expanded),
          editing: Boolean(block.editing),
          copied: false,
        };
      }

      function cleanNoteBlock(block) {
        const isLegacyChecklist = !block.type && Array.isArray(block.items);
        const type =
          block.type === "note" && !isLegacyChecklist ? "note" : "checklist";

        return {
          id: block.id || uid(),
          type,
          title: block.title || "Note Block",
          content: block.content || "",
          expanded: Boolean(block.expanded),
          items:
            Array.isArray(block.items) && block.items.length
              ? block.items.map((item) => ({
                  id: item.id || uid(),
                  text: item.text || "",
                  checked: Boolean(item.checked),
                }))
              : [{ id: uid(), text: "", checked: false }],
        };
      }

      function loadProjects() {
        const defaults = defaultProjects();

        try {
          const saved = JSON.parse(localStorage.getItem(PROJECT_STORAGE_KEY));
          if (Array.isArray(saved)) {
            const fallbackById = new Map(
              defaults.map((project) => [project.id, project]),
            );
            return saved.map((project, index) =>
              cleanProject(
                project,
                fallbackById.get(project.id) || defaults[index] || {},
              ),
            );
          }
        } catch (error) {
          console.warn("Unable to load ClientFlow projects.", error);
        }

        return defaults;
      }

      function saveProjects() {
        const storable = projects.map((project) => ({
          ...project,
          copyBlocks: project.copyBlocks.map(
            ({ copied, editing, ...block }) => block,
          ),
        }));

        localStorage.setItem(PROJECT_STORAGE_KEY, JSON.stringify(storable));
        showSaveState();
      }

      function showSaveState() {
        const state = document.getElementById("saveState");
        if (!state) return;

        state.textContent = "Saved";
        window.clearTimeout(saveMessageTimer);
        saveMessageTimer = window.setTimeout(() => {
          const nextState = document.getElementById("saveState");
          if (nextState) nextState.textContent = "";
        }, 1400);
      }

      function taskLabel(project) {
        return project.task === "Other"
          ? project.customTask || "Other"
          : project.task;
      }

      function dotHtml(status) {
        const dotClass = STATUS_DOT_CLASS[status] || "";
        return `<span class="dot ${dotClass}"></span>`;
      }

      function statusDotStyle(status) {
        const dotClass = STATUS_DOT_CLASS[status] || "";
        const colorMap = {
          yellow: "var(--yellow)",
          purple: "var(--purple)",
          cyan: "#62c6d7",
          green: "#66d48a",
          danger: "var(--danger)",
        };

        return colorMap[dotClass] || "var(--blue)";
      }

      function colorValue(colorId) {
        return (
          COLOR_OPTIONS.find((color) => color.id === colorId)?.value ||
          "var(--blue)"
        );
      }

      function loadRecentIcons() {
        try {
          const parsed = JSON.parse(
            localStorage.getItem(ICON_RECENTS_KEY) || "[]",
          );
          return Array.isArray(parsed)
            ? parsed
                .map(normalizeIconValue)
                .filter((icon) => ICON_OPTIONS.includes(icon))
                .slice(0, 12)
            : [];
        } catch {
          return [];
        }
      }

      function rememberIcon(icon) {
        const selected = normalizeIconValue(icon);
        localStorage.setItem(
          ICON_RECENTS_KEY,
          JSON.stringify(
            [
              selected,
              ...loadRecentIcons().filter((item) => item !== selected),
            ].slice(0, 12),
          ),
        );
      }

      function categoryIcons(categoryId) {
        if (categoryId === "recents") {
          const recents = loadRecentIcons();
          const fill = ICON_OPTIONS.filter((icon) => !recents.includes(icon));
          return [...recents, ...fill].slice(0, 12);
        }

        return (ICON_GROUPS[categoryId] || []).map((icon) => `solid:${icon}`);
      }

      function renderMenuControl({
        label,
        field,
        value,
        options,
        menuId,
        withStatusDots = false,
      }) {
        const selectedLabel =
          options.find((option) => option.value === value)?.label || value;

        return `
        <div class="control-stack">
          <label>${escapeHtml(label)}</label>
          <button class="control-btn" type="button" data-command="toggle-menu" data-menu="${escapeHtml(menuId)}">
            <span class="control-value">
              ${withStatusDots ? `<span class="status-dot-option" style="background:${statusDotStyle(value)}"></span>` : ""}
              ${escapeHtml(selectedLabel)}
            </span>
            <span class="chevron">⌄</span>
          </button>
          <div class="custom-menu ${activeCustomMenu === menuId ? "open" : ""}" data-menu-panel="${escapeHtml(menuId)}">
            ${options
              .map(
                (option) => `
              <button class="picker-option ${option.value === value ? "active" : ""}" type="button" data-command="set-project-field" data-project-field="${escapeHtml(field)}" data-value="${escapeHtml(option.value)}">
                <span class="control-value">
                  ${withStatusDots ? `<span class="status-dot-option" style="background:${statusDotStyle(option.value)}"></span>` : ""}
                  ${escapeHtml(option.label)}
                </span>
                ${option.value === value ? iconSvg("check") : ""}
              </button>
            `,
              )
              .join("")}
          </div>
        </div>
      `;
      }

      function renderIconPicker(project) {
        const iconsForCategory = categoryIcons(iconPickerCategory);
        const pageSize = iconPickerCategory === "recents" ? 12 : ICON_PAGE_SIZE;
        const pageCount = Math.max(
          1,
          Math.ceil(iconsForCategory.length / pageSize),
        );
        iconPickerPage = Math.min(iconPickerPage, pageCount - 1);
        const visibleIcons = iconsForCategory.slice(
          iconPickerPage * pageSize,
          iconPickerPage * pageSize + pageSize,
        );

        return `
        <div class="icon-picker">
          <div class="icon-category-row" role="tablist" aria-label="Icon categories">
            ${ICON_CATEGORIES.map(
              (category) => `
              <button class="icon-category ${category.id === iconPickerCategory ? "active" : ""}" type="button" data-command="icon-category" data-icon-category="${escapeHtml(category.id)}">
                ${iconSvg(category.icon)}
                <span>${escapeHtml(category.label)}</span>
              </button>
            `,
            ).join("")}
          </div>

          <div class="icon-grid" role="group" aria-label="Project icon choices">
            ${visibleIcons
              .map(
                (icon) => `
              <button class="icon-choice ${icon === normalizeIconValue(project.icon) ? "active" : ""}" type="button" data-command="set-project-icon" data-icon-value="${escapeHtml(icon)}" aria-label="${escapeHtml(iconLabel(iconName(icon)))} icon">
                ${iconSvg(icon)}
              </button>
            `,
              )
              .join("")}
          </div>

          ${
            iconPickerCategory !== "recents" && pageCount > 1
              ? `
            <div class="icon-pager" aria-label="Icon pages">
              <button class="icon-page-button" type="button" data-command="icon-page" data-icon-page="prev" ${iconPickerPage === 0 ? "disabled" : ""} aria-label="Previous icons"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></button>
              <span class="icon-page-label">
                ${Array.from(
                  { length: pageCount },
                  (_, index) => `
                  <button class="icon-page-number ${index === iconPickerPage ? "active" : ""}" type="button" data-command="icon-page-number" data-icon-page-number="${index}" aria-label="Icon page ${index + 1}">${index + 1}</button>
                `,
                ).join("")}
              </span>
              <button class="icon-page-button" type="button" data-command="icon-page" data-icon-page="next" ${iconPickerPage === pageCount - 1 ? "disabled" : ""} aria-label="Next icons"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>
            </div>
          `
              : ""
          }
        </div>
      `;
      }

      function renderAppearanceControls(project) {
        return `
        <div class="control-stack wide">
          <label>Project Icon + Color</label>
          <div class="project-appearance-controls">
            <button class="appearance-trigger ${activeAppearancePanel === "icon" ? "active" : ""}" type="button" data-command="toggle-appearance-panel" data-panel="icon" aria-label="Choose project icon">

            <button class="appearance-trigger color-trigger ${activeAppearancePanel === "color" ? "active" : ""}" type="button" data-command="toggle-appearance-panel" data-panel="color" style="--trigger-color:${colorValue(project.color)}" aria-label="Choose icon color"></button>
          </div>
        </div>
      `;

      function renderAppearancePopup(project) {
        if (!activeAppearancePanel) return "";

        const title =
          activeAppearancePanel === "icon" ? "Project Icon" : "Icon Color";
        const content =
          activeAppearancePanel === "icon"

            : renderColorPicker(project);

        return `

          <section class="sheet compact appearance-sheet" role="dialog" aria-modal="true" aria-labelledby="appearancePickerTitle">
            <div class="sheet-head">
              <h2 id="appearancePickerTitle">${title}</h2>
              <button class="small-btn" type="button" data-command="close-appearance-popup">${iconSvg("xmark")} Close</button>
            </div>
            ${content}
          </section>
        </div>
      `;
      }

      function renderColorPicker(project) {
        return `
        <div class="color-picker">
          <div class="color-grid" role="group" aria-label="Icon colors">
            ${COLOR_OPTIONS.map(
              (color) => `
              <button class="color-swatch ${project.color === color.id ? "active" : ""}" type="button" data-command="set-project-color" data-color-value="${escapeHtml(color.id)}" style="--swatch:${escapeHtml(color.value)}" aria-label="${escapeHtml(color.label)}"></button>
            `,
            ).join("")}
          </div>
        </div>
      `;
      }

      function renderDashboardProjectCards() {
        const query = projectSearch.value.trim().toLowerCase();
        const visibleProjects = projects.filter((project) => {
          const haystack =
            `${project.title} ${taskLabel(project)} ${project.description} ${project.status}`.toLowerCase();
          return haystack.includes(query);
        });

        projectGrid.innerHTML =
          visibleProjects
            .map((project) => {
              const titleClass =
                project.title.length > 28
                  ? "very-long-title"
                  : project.title.length > 18
                    ? "long-title"
                    : "";

              return `
        <article class="card ${expandedProjectCardId === project.id ? "expanded" : ""}" data-project-card="${escapeHtml(project.id)}" draggable="true">
          <button class="card-toggle-btn" type="button" data-card-toggle="${escapeHtml(project.id)}" aria-label="${expandedProjectCardId === project.id ? "Collapse project card" : "Expand project card"}">${expandedProjectCardId === project.id ? "−" : "+"}</button>
          ${dashboardEditing ? `<button class="small-btn danger card-delete-btn" type="button" data-delete-project="${escapeHtml(project.id)}" aria-label="Delete project">${iconSvg("trash")}</button>` : ""}
          <div class="card-summary">
            <div class="icon-box ${escapeHtml(project.color)}">${iconSvg(project.icon)}</div>
            <div class="card-title-stack">
              <h2 class="${titleClass}">${escapeHtml(project.title)}</h2>
              <div class="type">${escapeHtml(taskLabel(project))}</div>
            </div>
          </div>
          <div class="card-divider"></div>
          <p class="desc ${project.description.length > 92 ? "overflowing" : ""}">${escapeHtml(project.description)}</p>
          <div class="status">
  ${dotHtml(project.status)}
  ${escapeHtml(project.status)}
</div>
          ${expandedProjectCardId === project.id ? `<button class="open-btn" type="button" data-open-project="${escapeHtml(project.id)}">Open Project</button>` : ""}
        </article>
      `;
            })
            .join("") +
          `
        <button class="add-project-card" type="button" data-command="add-project" aria-label="Add project">
          <span class="add-project-plus">${iconSvg("plus")}</span>
        </button>
      `;

        dashboardEditBtn.textContent = dashboardEditing
          ? "Done Editing"
          : "Edit Projects";
      }

      function findProject(projectId) {
        return projects.find((project) => project.id === projectId);
      }

      function openProject(projectId) {
        activeProjectId = projectId;
        projectInfoOpen = false;
        expandedNoteId = null;
        activeCustomMenu = "";
        dashboardView.classList.remove("active");
        projectView.classList.add("active");
        renderProjectDetails();
        projectView.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function backToDashboard() {
        activeProjectId = null;
        expandedNoteId = null;
        projectInfoOpen = false;
        activeCustomMenu = "";
        projectView.classList.remove("active");
        dashboardView.classList.add("active");
        renderDashboardProjectCards();
        dashboardView.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function addProject() {
        const project = cleanProject(
          {
            id: uid(),
            title: "New Project",
            task: "Other",
            customTask: "",
            description: "",
            status: "Pending",
            icon: "file",
            color: "white",
            copyBlocks: [],
            noteBlocks: [],
          },
          {},
        );

        projects.push(project);
        saveProjects();
        renderDashboardProjectCards();
        openProject(project.id);
      }

      function deleteProject(projectId) {
        const index = projects.findIndex((project) => project.id === projectId);
        if (index < 0) return;

        projects.splice(index, 1);
        saveProjects();

        if (activeProjectId === projectId) {
          projectInfoOpen = false;
          expandedNoteId = null;
          backToDashboard();
          return;
        }

        renderDashboardProjectCards();
      }

      function moveProject(sourceId, targetId, afterTarget = false) {
        if (!sourceId || !targetId || sourceId === targetId) return;

        const sourceIndex = projects.findIndex(
          (project) => project.id === sourceId,
        );
        const targetIndex = projects.findIndex(
          (project) => project.id === targetId,
        );
        if (sourceIndex < 0 || targetIndex < 0) return;

        const [source] = projects.splice(sourceIndex, 1);
        const adjustedTargetIndex = projects.findIndex(
          (project) => project.id === targetId,
        );
        projects.splice(
          afterTarget ? adjustedTargetIndex + 1 : adjustedTargetIndex,
          0,
          source,
        );
        saveProjects();
        renderDashboardProjectCards();

      function iconLabel(name) {
        return name
          .split("-")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function normalizeIconValue(icon) {
        const iconAliases = {
          file: "solid:file-lines",
          doc: "solid:file-lines",
          coin: "solid:wallet",
          chart: "solid:chart-line",
          home: "solid:house",
          calendar: "solid:calendar-days",
          settings: "solid:gear",
          search: "solid:magnifying-glass",
          flower: "solid:seedling",
          sparkle: "solid:star",
          code: "solid:code",
          layers: "solid:layer-group",
          brush: "solid:palette",
          magic: "solid:star",
          target: "solid:bullseye",
          pin: "solid:location-dot",
          cart: "solid:cart-shopping",
          box: "solid:box-archive",
          shield: "solid:shield-halved",
          plug: "solid:plug",
          battery: "solid:battery-half",
          toolbox: "solid:screwdriver-wrench",
          spray: "solid:broom",
          note: "solid:note-sticky",
          arrow: "solid:arrow-left",
          copy: "solid:copy",
          edit: "solid:pen",
          trash: "solid:trash",
          plus: "solid:plus",
          check: "solid:check",
          xmark: "solid:xmark",
          tag: "solid:tag",
          clock: "solid:clock",
          briefcase: "solid:briefcase",
          star: "solid:star",
          shapes: "solid:shapes",
        };
        const value = String(icon || "").trim();
        if (!value) return "solid:file-lines";
        if (iconAliases[value]) return iconAliases[value];
        if (value.includes(":")) return value;
        return `solid:${value}`;
      }

      function parseIconValue(icon) {
        const normalized = normalizeIconValue(icon);
        const [style, ...nameParts] = normalized.split(":");
        return {
          style: ["solid", "regular", "brands"].includes(style)
            ? style
            : "solid",
          name: nameParts.join(":") || "file-lines",
        };
      }

      function faClass(icon) {
        const { style, name } = parseIconValue(icon);
        return `fa-${style} fa-${name}`;
      }

      function iconSvg(name) {
        return `<i class="${faClass(name)}" aria-hidden="true"></i>`;
      }

      function iconName(icon) {
        return parseIconValue(icon).name;
      }

      function taskLabel(project) {
        return project.task === "Other"
          ? project.customTask || "Other"
          : project.task;
      }

      function dotHtml(status) {
        const dotClass = STATUS_DOT_CLASS[status] || "";
        return `<span class="dot ${dotClass}"></span>`;

      function statusDotStyle(status) {
        const dotClass = STATUS_DOT_CLASS[status] || "";
        const colorMap = {
          yellow: "var(--yellow)",
          purple: "var(--purple)",
          cyan: "#62c6d7",
          green: "#66d48a",
          danger: "var(--danger)",
        };

        return colorMap[dotClass] || "var(--blue)";
      }

      function colorValue(colorId) {
        return (
          COLOR_OPTIONS.find((color) => color.id === colorId)?.value ||
          "var(--blue)"
        );
      }

      function normalizeCopyBlockFormat(format) {
        return ["text", "code", "url"].includes(format) ? format : "text";
      }

        return {

      function copyBlockPreviewClass(block) {

      function cleanProject(project, fallback) {
        const cleaned = { ...fallback, ...project };
        cleaned.id = cleaned.id || uid();
        cleaned.title = cleaned.title || "Untitled Project";
        cleaned.task = TASK_OPTIONS.includes(cleaned.task)
          ? cleaned.task
          : "Other";
        cleaned.customTask = cleaned.customTask || "";
        cleaned.description = cleaned.description || "";
        cleaned.status = STATUS_OPTIONS.includes(cleaned.status)
          ? cleaned.status
          : "Pending";
        cleaned.icon = ICON_OPTIONS.includes(normalizeIconValue(cleaned.icon))
          ? normalizeIconValue(cleaned.icon)
          : "solid:file-lines";
        cleaned.color = COLOR_OPTIONS.some(
          (color) => color.id === cleaned.color,
        )
          ? cleaned.color
          : "blue";
        cleaned.copyBlocks = Array.isArray(cleaned.copyBlocks)
          ? cleaned.copyBlocks.map(cleanBlock)
          : [];
        cleaned.noteBlocks = Array.isArray(cleaned.noteBlocks)
          ? cleaned.noteBlocks.map(cleanNoteBlock)
          : [];
        return cleaned;
      }

      function cleanBlock(block) {
        const format = ["text", "code", "url"].includes(block.format)
          ? block.format
          : "text";

        return {
          id: block.id || uid(),
          label: block.label || "Copy Block",
          content: block.content || "",
          visibleText: block.visibleText || "",
          url: block.url || "",
          format,
          expanded: Boolean(block.expanded),
          editing: Boolean(block.editing),
          copied: false,
        };
      }

      function cleanNoteBlock(block) {
        const isLegacyChecklist = !block.type && Array.isArray(block.items);
        const type =
          block.type === "note" && !isLegacyChecklist ? "note" : "checklist";

        return {
          id: block.id || uid(),
          type,
          title: block.title || "Note Block",
          content: block.content || "",
          expanded: Boolean(block.expanded),
          items:
            Array.isArray(block.items) && block.items.length
              ? block.items.map((item) => ({
                  id: item.id || uid(),
                  text: item.text || "",
                  checked: Boolean(item.checked),
                }))
              : [{ id: uid(), text: "", checked: false }],
        };
      }

      function loadProjects() {
        const defaults = defaultProjects();

        try {
          const saved = JSON.parse(localStorage.getItem(PROJECT_STORAGE_KEY));
          if (Array.isArray(saved)) {
            const fallbackById = new Map(
              defaults.map((project) => [project.id, project]),
            );
            return saved.map((project, index) =>
              cleanProject(
                project,
                fallbackById.get(project.id) || defaults[index] || {},
              ),
            );
          }
        } catch (error) {
          console.warn("Unable to load ClientFlow projects.", error);
        }

        return defaults;
      }

        const storable = projects.map((project) => ({
          ...project,
          copyBlocks: project.copyBlocks.map(
            ({ copied, editing, ...block }) => block,

        localStorage.setItem(PROJECT_STORAGE_KEY, JSON.stringify(storable));
        showSaveState();

        return (ICON_GROUPS[categoryId] || []).map((icon) => `solid:${icon}`);
