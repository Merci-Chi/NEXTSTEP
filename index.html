          <div class="card-summary">
            <div class="icon-box ${escapeHtml(project.color)}">${iconSvg(project.icon)}</div>
            <div class="card-title-stack">
              <h2 class="${titleClass}">${escapeHtml(project.title)}</h2>
              <div class="type">${escapeHtml(taskLabel(project))}</div>
            </div>
          </div>
          <div class="card-divider"></div>
          <p class="desc ${project.description.length > 92 ? "overflowing" : ""}">${escapeHtml(project.description)}</p>
          <div class="status">
  ${dotHtml(project.status)}
  ${escapeHtml(project.status)}
</div>
          ${expandedProjectCardId === project.id ? `<button class="open-btn" type="button" data-open-project="${escapeHtml(project.id)}">Open Project</button>` : ""}
        </article>
      `;
            })
            .join("") +
          `
        <button class="add-project-card" type="button" data-command="add-project" aria-label="Add project">
          <span class="add-project-plus">${iconSvg("plus")}</span>
        </button>
      `;

        dashboardEditBtn.textContent = dashboardEditing
          ? "Done Editing"
          : "Edit Projects";
      }

      function renderProjectDetails() {
        const project = findProject(activeProjectId);
        if (!project) {
          backToDashboard();
          return;
        }

        projectView.innerHTML = `
        <div class="project-page">
          <div class="project-top">
            <div class="project-heading">
              <div class="icon-box icon-preview" style="color:${colorValue(project.color)}">${iconSvg(project.icon)}</div>
              <div>
                <input class="project-title-input" type="text" value="${escapeHtml(project.title)}" data-project-field="title" aria-label="Project title" />
                <div class="project-status-line">
                  ${dotHtml(project.status)}
                  <span>${escapeHtml(project.status)}</span>
                  <span class="save-state" id="saveState"></span>
                </div>
              </div>
            </div>
            <div class="project-actions">
  <button class="back-btn checklist-top-btn" type="button" data-command="toggle-top-checklist" aria-label="Add checklist item">${iconSvg("list-check")}</button>
  <button class="back-btn" type="button" data-command="open-project-info">${iconSvg("edit")} Edit</button>
  <button class="back-btn" type="button" data-command="back-to-dashboard">${iconSvg("arrow")} Back</button>
</div>
          </div>
          ${renderTopChecklist(project)}

          <section class="project-panel copy-section">
            <div class="copy-section-head">
              <h2>Copy Blocks</h2>
              <div class="copy-block-actions">
  ${project.copyBlocks.length ? `<button class="small-btn" type="button" data-command="toggle-copy-edit-mode">${copyBlocksEditing ? "Done" : "Sort"}</button>` : ""}
  <button class="small-btn" type="button" data-command="open-copy-block-popup">Add</button>
</div>
            </div>

            <div class="copy-block-grid" id="copyBlocks">
            
              ${renderCopyBlocks(project)}
            </div>
          </section>

          ${projectInfoOpen ? renderProjectInfoModal(project) : ""}
${projectInfoOpen ? renderAppearancePopup(project) : ""}
${copyBlockPopupOpen ? renderAddCopyBlockModal() : ""}

        </div>
      `;
      }

      function renderTopChecklist(project) {
        const checklistBlocks = project.noteBlocks.filter(
          (block) => block.type === "checklist",
        );
        if (!checklistBlocks.length) return "";

        return `
    <section class="top-checklist-wrap">
      ${checklistBlocks
        .map(
          (block) => `
        <article class="top-checklist" data-note-id="${escapeHtml(block.id)}" data-note-kind="checklist">
          <div class="check-list">
            ${block.items
              .map(
                (item) => `
              <div class="check-row ${item.checked ? "checked" : ""}" data-check-id="${escapeHtml(item.id)}">
                <button class="check-toggle ${item.checked ? "checked" : ""}" type="button" data-command="toggle-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Toggle checkbox">
                  ${item.checked ? iconSvg("check") : ""}
                </button>

                <textarea class="check-input wrap" rows="1" data-check-field="text" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" placeholder="Checklist item">${escapeHtml(item.text)}</textarea>

                <button class="small-btn danger block-icon-button" type="button" data-command="delete-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Delete checkbox">${iconSvg("trash")}</button>
              </div>
            `,
              )
              .join("")}
          </div>
        </article>
      `,
        )
        .join("")}
    </section>
  `;
      }

      function renderAddCopyBlockModal() {
        return `
    <div class="modal open" data-modal="add-copy-block">
      <section class="sheet compact" role="dialog" aria-modal="true" aria-labelledby="addCopyBlockTitle">
        <div class="sheet-head">
          <h2 id="addCopyBlockTitle">Add Copy Block</h2>
          <button class="small-btn" type="button" data-command="close-copy-block-popup">${iconSvg("xmark")} Close</button>
        </div>

        <div class="copy-edit-grid">
          <div class="control-stack">
            <label>Block Type</label>
            <div class="format-row">
              <button class="format-choice ${copyBlockDraft.format === "text" ? "active" : ""}" type="button" data-command="set-copy-draft-format" data-format="text">Text</button>
              <button class="format-choice ${copyBlockDraft.format === "code" ? "active" : ""}" type="button" data-command="set-copy-draft-format" data-format="code">Code</button>
              <button class="format-choice ${copyBlockDraft.format === "url" ? "active" : ""}" type="button" data-command="set-copy-draft-format" data-format="url">URL</button>
            </div>
          </div>

          ${
            copyBlockDraft.format === "url"
              ? `
            <div class="field">
              <label>Visible Text</label>
              <input type="text" value="${escapeHtml(copyBlockDraft.visibleText)}" data-copy-draft-field="visibleText" placeholder="Example: View website" />
            </div>

            <div class="field">
              <label>URL Link</label>
              <input type="url" value="${escapeHtml(copyBlockDraft.url)}" data-copy-draft-field="url" placeholder="https://example.com" />
            </div>
          `
              : `
            <div class="field">
              <label>Block Label</label>
              <input type="text" value="${escapeHtml(copyBlockDraft.label)}" data-copy-draft-field="label" placeholder="${copyBlockDraft.format === "code" ? "Example: Header Code" : "Example: Client Message"}" />
            </div>

            <div class="field">
              <label>${copyBlockDraft.format === "code" ? "Code" : "Text"}</label>
              <textarea data-copy-draft-field="content" placeholder="${copyBlockDraft.format === "code" ? "Paste code here" : "Write text here"}">${escapeHtml(copyBlockDraft.content)}</textarea>
            </div>
          `
          }

          <button class="add-block-btn" type="button" data-command="create-copy-block-from-popup">Create Block</button>
        </div>
      </section>
    </div>
  `;
      }

      function renderProjectInfoModal(project) {
        return `
        <div class="modal open" data-modal="project-info">
          <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="projectInfoTitle">
            <div class="sheet-head">
              <h2 id="projectInfoTitle">Project Information</h2>
              <div class="copy-block-actions">
                <button class="small-btn danger" type="button" data-command="delete-active-project">${iconSvg("trash")} Delete Project</button>
                <button class="small-btn" type="button" data-command="close-project-info">${iconSvg("xmark")} Close</button>
              </div>
            </div>

            <div class="project-form-grid">
              ${renderMenuControl({
                label: "Current Task",
                field: "task",
                value: project.task,
                menuId: "task",
                options: TASK_OPTIONS.map((task) => ({
                  label: task,
                  value: task,
                })),
              })}

              ${renderMenuControl({
                label: "Status",
                field: "status",
                value: project.status,
                menuId: "status",
                withStatusDots: true,
                options: STATUS_OPTIONS.map((status) => ({
                  label: status,
                  value: status,
                })),
              })}

              <div class="field wide" ${project.task === "Other" ? "" : "hidden"}>
                <label for="customTask">Custom Task</label>
                <input id="customTask" type="text" value="${escapeHtml(project.customTask)}" data-project-field="customTask" placeholder="Custom project task" />
              </div>

              <div class="field wide">
                <label for="projectDescription">Project Description</label>
                <textarea id="projectDescription" data-project-field="description" placeholder="Project description">${escapeHtml(project.description)}</textarea>
              </div>

              ${renderAppearanceControls(project)}
            </div>
          </section>
        </div>
      `;
      }

      function renderCopyBlockActions(block, index, totalBlocks) {
        const blockId = escapeHtml(block.id);

        if (copyBlocksEditing) {
          return `
          <div class="copy-reorder">
            <button class="small-btn block-icon-button" type="button" data-command="move-copy-block" data-block-id="${blockId}" data-direction="up" ${index === 0 ? "disabled" : ""} aria-label="Move up">↑</button>
            <button class="small-btn block-icon-button" type="button" data-command="move-copy-block" data-block-id="${blockId}" data-direction="down" ${index === totalBlocks - 1 ? "disabled" : ""} aria-label="Move down">↓</button>
            <button class="small-btn danger block-icon-button" type="button" data-command="delete-block" data-block-id="${blockId}" aria-label="Delete block">${iconSvg("trash")}</button>
          </div>
        `;
        }

        return `
        <span class="copy-confirm">${block.copied ? "Copied!" : ""}</span>
        <button class="copy-button" type="button" data-command="copy-block" data-block-id="${blockId}" aria-label="Copy block">${iconSvg("copy")}</button>
        <button class="small-btn block-icon-button" type="button" data-command="edit-block" data-block-id="${blockId}" aria-label="Edit copy block">${iconSvg("edit")}</button>
        <button class="small-btn danger block-icon-button" type="button" data-command="delete-block" data-block-id="${blockId}" aria-label="Delete block">${iconSvg("trash")}</button>
      `;
      }

      function renderCopyBlockHeader(block, index, totalBlocks) {
        const blockId = escapeHtml(block.id);
        const previewText = escapeHtml(copyBlockPreviewText(block));

        const titleMarkup =
          block.format === "url"
            ? `
          <a class="${copyBlockPreviewClass(block)}" href="${escapeHtml(block.url || "#")}" target="_blank" rel="noopener noreferrer" data-block-id="${blockId}">
            <span>${previewText}</span>
          </a>
        `
            : block.label.trim()
              ? `<div class="copy-block-title">${escapeHtml(block.label)}</div>`
              : "";

        return `
        <div class="copy-block-top">
          ${titleMarkup}

          <div class="copy-block-actions">
            ${renderCopyBlockActions(block, index, totalBlocks)}
          </div>
        </div>
      `;
      }

      function renderCodeExpandButton(block) {
        return `
        <button class="copy-button code-expand-button" type="button" data-command="toggle-block" data-block-id="${escapeHtml(block.id)}" aria-label="${block.expanded ? "Collapse code block" : "Expand code block"}">
          ${block.expanded ? "−" : "+"}
        </button>
      `;
      }

      function renderCopyBlockEditor(block) {
        const blockId = escapeHtml(block.id);
        const collapsed = !block.expanded;

        if (block.format === "url") {
          return `
          <div class="copy-edit-grid">
            <div class="copy-edit-row">
              <div class="field">
                <label>Visible Text</label>
                <input type="text" value="${escapeHtml(block.visibleText || "")}" data-block-field="visibleText" data-block-id="${blockId}" placeholder="Example: View website" />
              </div>

              <div class="field">
                <label>URL Link</label>
                <input type="url" value="${escapeHtml(block.url || "")}" data-block-field="url" data-block-id="${blockId}" placeholder="https://example.com" />
              </div>
            </div>
          </div>
        `;
        }

        return `
        <div class="copy-edit-grid">
          <div class="copy-edit-row stack-edit-row">
            <div class="field">
              <label>Label</label>
              <input type="text" value="${escapeHtml(block.label)}" data-block-field="label" data-block-id="${blockId}" placeholder="Block label" />
            </div>

            <div class="field ${block.format === "code" ? `code-edit-wrap ${collapsed ? "code-collapsed" : "code-expanded"}` : ""}">
              <label>Content</label>

              ${block.format === "code" ? renderCodeExpandButton(block) : ""}

              <textarea data-block-field="content" data-block-id="${blockId}" placeholder="Paste reusable content here">${escapeHtml(block.content)}</textarea>
            </div>
          </div>
        </div>
      `;
      }

      function renderCopyBlockPreview(block) {
        const blockId = escapeHtml(block.id);
        const previewText = escapeHtml(copyBlockPreviewText(block));
        const collapsed = !block.expanded;

        if (block.format === "url") {
          return "";
        }

        if (block.format === "code") {
          return `
          <div class="code-preview-wrap ${collapsed ? "code-collapsed" : "code-expanded"}">
            ${renderCodeExpandButton(block)}

            <div class="${copyBlockPreviewClass(block)} code-with-expand" data-block-id="${blockId}">${previewText}</div>
          </div>
        `;
        }

        return `
        <div class="${copyBlockPreviewClass(block)}" data-block-id="${blockId}">${previewText}</div>
      `;
      }

      function renderCopyBlock(block, index, totalBlocks) {
        const blockClasses = [
          "copy-block",
          block.format === "url" ? "url-block" : "",
          copyBlocksEditing ? "edit-compact" : "",
        ]
          .filter(Boolean)
          .join(" ");

        return `
        <article class="${blockClasses}" data-block-id="${escapeHtml(block.id)}">
          ${renderCopyBlockHeader(block, index, totalBlocks)}

          ${
            copyBlocksEditing
              ? ""
              : block.editing
                ? renderCopyBlockEditor(block)
                : renderCopyBlockPreview(block)
          }
        </article>
      `;
      }

      function renderCopyBlocks(project) {
        if (!project.copyBlocks.length) {
          return `<div class="empty-blocks">No copy blocks yet.</div>`;
        }

        return project.copyBlocks
          .map((block, index) =>
            renderCopyBlock(block, index, project.copyBlocks.length),
          )
          .join("");
      }

      function renderNoteBlocks(project) {
        if (!project.noteBlocks.length) {
          return `<div class="empty-blocks">No notes yet.</div>`;
        }

        return project.noteBlocks
          .map((block) => {
            const isNote = block.type === "note";

            return `
          <article class="note-block" data-note-id="${escapeHtml(block.id)}" data-note-kind="${escapeHtml(block.type)}" ${!isNote ? `draggable="true"` : ""}>
            <div class="note-title-row">
              <div></div>
              <div class="copy-block-actions">
                ${isNote && block.content ? `<button class="small-btn note-copy-inline" type="button" data-command="copy-note" data-note-id="${escapeHtml(block.id)}">${iconSvg("copy")} Copy</button>` : ""}
                ${!isNote ? `<button class="small-btn" type="button" data-command="add-check-item" data-note-id="${escapeHtml(block.id)}">${iconSvg("plus")} Checkbox</button>` : ""}
                <button class="small-btn danger" type="button" data-command="delete-note-block" data-note-id="${escapeHtml(block.id)}">${iconSvg("trash")} Delete</button>
              </div>
            </div>

            ${
              isNote
                ? `
              <div class="note-preview ${block.content ? "" : "empty"}" data-command="expand-note" data-note-id="${escapeHtml(block.id)}">
                ${block.content ? escapeHtml(block.content) : `<span class="add-project-plus">${iconSvg("plus")}</span><span>Tap to write</span>`}
              </div>
            `
                : `
              <div class="check-list">
                ${block.items
                  .map(
                    (item) => `
                  <div class="check-row ${item.checked ? "checked" : ""}" data-check-id="${escapeHtml(item.id)}">
                    <button class="check-toggle ${item.checked ? "checked" : ""}" type="button" data-command="toggle-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Toggle checkbox">${item.checked ? iconSvg("check") : ""}</button>
                    <textarea class="check-input wrap" rows="1" data-check-field="text" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" placeholder="Checkbox item">${escapeHtml(item.text)}</textarea>
                    <button class="small-btn danger block-icon-button" type="button" data-command="delete-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Delete checkbox">${iconSvg("trash")}</button>
                  </div>
                `,
                  )
                  .join("")}
              </div>
            `
            }
          </article>
        `;
          })
          .join("");
      }

      function renderExpandedNoteModal(project) {
        const note = project.noteBlocks.find(
          (block) => block.id === expandedNoteId,
        );
        if (!note) return "";

        return `
        <div class="modal open" data-modal="expanded-note">
          <section class="sheet expanded-note" role="dialog" aria-modal="true" aria-labelledby="expandedNoteTitle">
            <div class="sheet-head">
              <h2 id="expandedNoteTitle">Note</h2>
              <button class="small-btn" type="button" data-command="close-expanded-note">${iconSvg("xmark")} Close</button>
            </div>
            <div class="note-popup-body">
              <textarea class="note-popup-field" data-note-field="content" data-note-id="${escapeHtml(note.id)}">${escapeHtml(note.content || "")}</textarea>
            </div>
          </section>
        </div>
      `;
      }

      // =========================
      // Project actions
      // =========================

      function findProject(projectId) {
        return projects.find((project) => project.id === projectId);
      }

      function openProject(projectId) {
        activeProjectId = projectId;
        projectInfoOpen = false;
        expandedNoteId = null;
        activeCustomMenu = "";
        dashboardView.classList.remove("active");
        projectView.classList.add("active");
        renderProjectDetails();
        projectView.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function backToDashboard() {
        activeProjectId = null;
        expandedNoteId = null;
        projectInfoOpen = false;
        activeCustomMenu = "";
        projectView.classList.remove("active");
        dashboardView.classList.add("active");
        renderDashboardProjectCards();
        dashboardView.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function addProject() {
        const project = cleanProject(
          {
            id: uid(),
            title: "New Project",
            task: "Other",
            customTask: "",
            description: "",
            status: "Pending",
            icon: "file",
            color: "white",
            copyBlocks: [],
            noteBlocks: [],
          },
          {},
        );

        projects.push(project);
        saveProjects();
        renderDashboardProjectCards();
        openProject(project.id);
      }

      function deleteProject(projectId) {
        const index = projects.findIndex((project) => project.id === projectId);
        if (index < 0) return;

        projects.splice(index, 1);
        saveProjects();

        if (activeProjectId === projectId) {
          projectInfoOpen = false;
          expandedNoteId = null;
          backToDashboard();
          return;
        }

        renderDashboardProjectCards();
      }

      function moveProject(sourceId, targetId, afterTarget = false) {
        if (!sourceId || !targetId || sourceId === targetId) return;

        const sourceIndex = projects.findIndex(
          (project) => project.id === sourceId,
        );
        const targetIndex = projects.findIndex(
          (project) => project.id === targetId,
        );
        if (sourceIndex < 0 || targetIndex < 0) return;

        const [source] = projects.splice(sourceIndex, 1);
        const adjustedTargetIndex = projects.findIndex(
          (project) => project.id === targetId,
        );
        projects.splice(
          afterTarget ? adjustedTargetIndex + 1 : adjustedTargetIndex,
          0,
          source,
        );
        saveProjects();
        renderDashboardProjectCards();
      }

      function saveProjectUpdates(field, value, shouldRender = false) {
        const project = findProject(activeProjectId);
        if (!project) return;

        project[field] = value;

        if (field === "task" && value !== "Other") {
          project.customTask = "";
        }

        saveProjects();
        if (shouldRender) {
          renderProjectDetails();
        }
      }

      function openProjectInfo() {
        projectInfoOpen = true;
        activeCustomMenu = "";
        activeAppearancePanel = "";
        renderProjectDetails();
      }

      function closeProjectInfo() {
        projectInfoOpen = false;
        activeCustomMenu = "";
        activeAppearancePanel = "";
        renderProjectDetails();
      }

      function closeAppearancePopup() {
        activeAppearancePanel = "";
        renderProjectDetails();
      }

      function setProjectField(field, value) {
        saveProjectUpdates(field, value);
        activeCustomMenu = "";
        renderProjectDetails();
      }

      function setProjectIcon(icon) {
        const selected = normalizeIconValue(icon);
        saveProjectUpdates("icon", selected);
        rememberIcon(selected);
        renderProjectDetails();
      }

      function setProjectColor(color) {
        saveProjectUpdates("color", color);
        renderProjectDetails();
      }

      // =========================
      // Copy block actions
      // =========================

      function addCopyBlock(type = "text") {
        copyBlockDraft = defaultCopyBlockDraft(normalizeCopyBlockFormat(type));
        copyBlockPopupOpen = true;
        activeCustomMenu = "";
        renderProjectDetails();
      }

      function closeCopyBlockPopup() {
        copyBlockPopupOpen = false;
        copyBlockDraft = defaultCopyBlockDraft();
        renderProjectDetails();
      }

      function setCopyDraftFormat(format) {
        copyBlockDraft.format = normalizeCopyBlockFormat(format);
        renderProjectDetails();
      }

      function updateCopyDraft(field, value) {
        copyBlockDraft[field] = value;
      }

      function buildCopyBlockFromDraft() {
        const format = normalizeCopyBlockFormat(copyBlockDraft.format);
        const isUrl = format === "url";

        return {
          id: uid(),
          label: isUrl
            ? copyBlockDraft.visibleText || "URL Block"
            : copyBlockDraft.label ||
              (format === "code" ? "Code Block" : "Text Block"),
          content: isUrl ? "" : copyBlockDraft.content,
          visibleText: isUrl ? copyBlockDraft.visibleText : "",
          url: isUrl ? copyBlockDraft.url : "",
          format,
          expanded: false,
          editing: false,
          copied: false,
        };
      }

      function createCopyBlockFromPopup() {
        const project = findProject(activeProjectId);
        if (!project) return;

        project.copyBlocks.unshift(buildCopyBlockFromDraft());

        copyBlockPopupOpen = false;
        copyBlockDraft = defaultCopyBlockDraft();

        saveProjects();
        renderProjectDetails();
      }

      function updateCopyBlock(blockId, field, value) {
        const project = findProject(activeProjectId);
        const block = project?.copyBlocks.find((item) => item.id === blockId);
        if (!block) return;

        block[field] = value;
        saveProjects();

        if (field === "format") {
          renderProjectDetails();
        }
      }

      function toggleCopyBlock(blockId) {
        const project = findProject(activeProjectId);
        const block = project?.copyBlocks.find((item) => item.id === blockId);
        if (!block) return;

        block.expanded = !block.expanded;
        saveProjects();
        renderProjectDetails();
      }

      function editCopyBlock(blockId) {
        const project = findProject(activeProjectId);
        const selectedBlock = project?.copyBlocks.find(
          (block) => block.id === blockId,
        );
        if (!selectedBlock) return;

        copyBlocksEditing = false;

        project.copyBlocks.forEach((block) => {
          if (block.id === blockId) {
            block.editing = !block.editing;
            if (block.format !== "code") block.expanded = true;
          } else {
            block.editing = false;
          }
        });

        activeCustomMenu = "";
        saveProjects();
        renderProjectDetails();
      }

      function moveCopyBlock(blockId, direction) {
        const project = findProject(activeProjectId);
        if (!project) return;

        const index = project.copyBlocks.findIndex(
          (block) => block.id === blockId,
        );
        const nextIndex = direction === "up" ? index - 1 : index + 1;

        if (
          index < 0 ||
          nextIndex < 0 ||
          nextIndex >= project.copyBlocks.length
        )
          return;

        const [block] = project.copyBlocks.splice(index, 1);
        project.copyBlocks.splice(nextIndex, 0, block);
        saveProjects();
        renderProjectDetails();
      }

      function deleteCopyBlock(blockId) {
        const project = findProject(activeProjectId);
        if (!project) return;

        project.copyBlocks = project.copyBlocks.filter(
          (block) => block.id !== blockId,
        );
        saveProjects();
        renderProjectDetails();
      }

      async function copyBlockContent(blockId) {
        const project = findProject(activeProjectId);
        const block = project?.copyBlocks.find((item) => item.id === blockId);
        if (!block) return;

        try {
          await navigator.clipboard.writeText(
            block.format === "url" ? block.url : block.content,
          );
        } catch (error) {
          const helper = document.createElement("textarea");
          helper.value = block.format === "url" ? block.url : block.content;
          helper.setAttribute("readonly", "");
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }

        block.copied = true;
        renderProjectDetails();

        window.setTimeout(() => {
          block.copied = false;
          if (activeProjectId === project.id) renderProjectDetails();
        }, 1200);
      }

      // =========================
      // Note and checklist actions
      // =========================

      function toggleTopChecklist() {
        const project = findProject(activeProjectId);
        if (!project) return;

        const existingChecklist = project.noteBlocks.find(
          (block) => block.type === "checklist",
        );

        if (existingChecklist) {
          const firstEmpty = existingChecklist.items.find(
            (item) => !item.text.trim(),
          );

          if (!firstEmpty) {
            existingChecklist.items.push({
              id: uid(),
              text: "",
              checked: false,
            });
          }

          saveProjects();
          renderProjectDetails();

          window.requestAnimationFrame(() => {
            const itemToFocus =
              existingChecklist.items.find((item) => !item.text.trim()) ||
              existingChecklist.items[existingChecklist.items.length - 1];
            document
              .querySelector(
                `[data-check-id="${itemToFocus.id}"][data-check-field="text"]`,
              )
              ?.focus();
          });

          return;
        }

        const newItem = { id: uid(), text: "", checked: false };

        project.noteBlocks.unshift({
          id: uid(),
          type: "checklist",
          title: "Checklist",
          content: "",
          expanded: false,
          items: [newItem],
        });

        saveProjects();
        renderProjectDetails();

        window.requestAnimationFrame(() => {
          document
            .querySelector(
              `[data-check-id="${newItem.id}"][data-check-field="text"]`,
            )
            ?.focus();
        });
      }

      function addNoteBlock(type = "note") {
        const project = findProject(activeProjectId);
        if (!project) return;

        project.noteBlocks.unshift({
          id: uid(),
          type: type === "checklist" ? "checklist" : "note",
          title: type === "checklist" ? "Checklist" : "Note",
          content: "",
          expanded: false,
          items: [{ id: uid(), text: "", checked: false }],
        });

        activeCustomMenu = "";
        saveProjects();
        renderProjectDetails();
      }

      function updateNoteBlock(noteId, field, value) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        if (!note) return;

        note[field] = value;
        saveProjects();
      }

      function deleteNoteBlock(noteId) {
        const project = findProject(activeProjectId);
        if (!project) return;

        project.noteBlocks = project.noteBlocks.filter(
          (note) => note.id !== noteId,
        );
        saveProjects();
        renderProjectDetails();
      }

      function addCheckItem(noteId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        if (!note) return;

        note.items.push({ id: uid(), text: "", checked: false });
        saveProjects();
        renderProjectDetails();
      }

      function updateCheckItem(noteId, checkId, field, value) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        const item = note?.items.find((check) => check.id === checkId);
        if (!item) return;

        item[field] = value;
        saveProjects();
      }

      function removeEmptyCheckItem(noteId, checkId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        const item = note?.items.find((check) => check.id === checkId);
        if (!project || !note || !item || item.text.trim()) return;

        note.items = note.items.filter((check) => check.id !== checkId);

        const hasAnyText = note.items.some((check) => check.text.trim());

        if (!hasAnyText) {
          project.noteBlocks = project.noteBlocks.filter(
            (block) => block.id !== noteId,
          );
        }

        saveProjects();
        renderProjectDetails();
      }

      function toggleCheckItem(noteId, checkId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        const item = note?.items.find((check) => check.id === checkId);
        if (!item) return;

        item.checked = !item.checked;
        saveProjects();
        renderProjectDetails();
      }

      function deleteCheckItem(noteId, checkId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        if (!project || !note) return;

        note.items = note.items.filter((item) => item.id !== checkId);

        if (!note.items.some((item) => item.text.trim())) {
          project.noteBlocks = project.noteBlocks.filter(
            (block) => block.id !== noteId,
          );
        }

        saveProjects();
        renderProjectDetails();
      }

      function insertCheckItemAfter(noteId, checkId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((item) => item.id === noteId);
        if (!note) return;

        const index = note.items.findIndex((item) => item.id === checkId);
        const next = { id: uid(), text: "", checked: false };
        note.items.splice(index >= 0 ? index + 1 : note.items.length, 0, next);
        saveProjects();
        renderProjectDetails();

        window.requestAnimationFrame(() => {
          document
            .querySelector(
              `[data-check-id="${next.id}"][data-check-field="text"]`,
            )
            ?.focus();
        });
      }

      function expandNote(noteId) {
        expandedNoteId = noteId;
        renderProjectDetails();
      }

      function closeExpandedNote() {
        expandedNoteId = null;
        renderProjectDetails();
      }

      async function copyNoteContent(noteId) {
        const project = findProject(activeProjectId);
        const note = project?.noteBlocks.find((block) => block.id === noteId);
        if (!note) return;

        try {
          await navigator.clipboard.writeText(note.content || "");
        } catch {
          const helper = document.createElement("textarea");
          helper.value = note.content || "";
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }
      }

      function moveNoteBlock(sourceId, targetId, afterTarget = false) {
        const project = findProject(activeProjectId);
        if (!project || sourceId === targetId) return;

        const sourceIndex = project.noteBlocks.findIndex(
          (block) => block.id === sourceId,
        );
        const targetIndex = project.noteBlocks.findIndex(
          (block) => block.id === targetId,
        );
        if (sourceIndex < 0 || targetIndex < 0) return;

        const [source] = project.noteBlocks.splice(sourceIndex, 1);
        const adjustedTarget = project.noteBlocks.findIndex(
          (block) => block.id === targetId,
        );
        project.noteBlocks.splice(
          afterTarget ? adjustedTarget + 1 : adjustedTarget,
          0,
          source,
        );
        saveProjects();
        renderProjectDetails();
      }

      // =========================
      // Event binding and app startup
      // =========================

      function hydrateStaticIcons() {
        document.querySelectorAll("[data-icon]").forEach((element) => {
          const name = element.dataset.icon;
          element.innerHTML = iconSvg(name);
        });
      }

      function bindAuthEvents() {
        loginForm.addEventListener("submit", function (event) {
          event.preventDefault();

          const username = usernameInput.value.trim();
          const password = passwordInput.value.trim();

          if (
            username.toLowerCase() === VALID_USER &&
            password === VALID_PASSWORD
          ) {
            setLoggedInUser(username);
            return;
          }

          loginError.textContent = "Invalid user or password.";
        });

        logoutBtn.addEventListener("click", logout);
      }

      function restoreSavedLogin() {
        const savedUser = localStorage.getItem("clientflow_user");

        if (savedUser) {
          setLoggedInUser(savedUser);
        }
      }

      function bindDashboardEvents() {
        projectSearch.addEventListener("input", renderDashboardProjectCards);

        dashboardEditBtn.addEventListener("click", () => {
          dashboardEditing = !dashboardEditing;
          renderDashboardProjectCards();
        });

        projectGrid.addEventListener("click", (event) => {
          const addButton = event.target.closest(
            "[data-command='add-project']",
          );
          const deleteButton = event.target.closest("[data-delete-project]");
          const button = event.target.closest("[data-open-project]");
          const toggleButton = event.target.closest("[data-card-toggle]");
          const card = event.target.closest("[data-project-card]");

          if (addButton) {
            addProject();
            return;
          }

          if (deleteButton) {
            deleteProject(deleteButton.dataset.deleteProject);
            return;
          }

          if (button) {
            openProject(button.dataset.openProject);
            return;
          }

          if (toggleButton || card) {
            const projectId =
              toggleButton?.dataset.cardToggle || card.dataset.projectCard;
            expandedProjectCardId =
              expandedProjectCardId === projectId ? "" : projectId;
            renderDashboardProjectCards();
          }
        });

        projectGrid.addEventListener("dragstart", (event) => {
          const card = event.target.closest("[data-project-card]");
          if (!card) return;

          draggedProjectId = card.dataset.projectCard;
          card.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
        });

        projectGrid.addEventListener("dragover", (event) => {
          const card = event.target.closest("[data-project-card]");
          if (
            !card ||
            !draggedProjectId ||
            card.dataset.projectCard === draggedProjectId
          )
            return;

          event.preventDefault();
          const rect = card.getBoundingClientRect();
          const after = event.clientX > rect.left + rect.width / 2;
          card.classList.toggle("drop-before", !after);
          card.classList.toggle("drop-after", after);
        });

        projectGrid.addEventListener("dragleave", (event) => {
          const card = event.target.closest("[data-project-card]");
          if (!card) return;

          card.classList.remove("drop-before", "drop-after");
        });

        projectGrid.addEventListener("drop", (event) => {
          const card = event.target.closest("[data-project-card]");
          if (!card || !draggedProjectId) return;

          event.preventDefault();
          const after = card.classList.contains("drop-after");
          moveProject(draggedProjectId, card.dataset.projectCard, after);
          draggedProjectId = "";
        });

        projectGrid.addEventListener("dragend", () => {
          draggedProjectId = "";
          projectGrid
            .querySelectorAll(".dragging, .drop-before, .drop-after")
            .forEach((element) => {
              element.classList.remove("dragging", "drop-before", "drop-after");
            });
        });
      }

      function bindProjectEvents() {
        projectView.addEventListener("input", (event) => {
          const draftInput = event.target.closest("[data-copy-draft-field]");
          const projectField = event.target.dataset.projectField;
          const blockField = event.target.dataset.blockField;
          const noteField = event.target.dataset.noteField;
          const checkField = event.target.dataset.checkField;

          if (draftInput) {
            updateCopyDraft(
              draftInput.dataset.copyDraftField,
              draftInput.value,
            );
          }

          if (projectField) {
            saveProjectUpdates(projectField, event.target.value);
          }

          if (blockField) {
            updateCopyBlock(
              event.target.dataset.blockId,
              blockField,
              event.target.value,
            );
          }

          if (noteField) {
            updateNoteBlock(
              event.target.dataset.noteId,
              noteField,
              event.target.value,
            );
          }

          if (checkField) {
            updateCheckItem(
              event.target.dataset.noteId,
              event.target.dataset.checkId,
              checkField,
              event.target.value,
            );
          }
        });

        projectView.addEventListener("change", (event) => {
          const projectField = event.target.dataset.projectField;
          const blockField = event.target.dataset.blockField;

          if (projectField) {
            saveProjectUpdates(projectField, event.target.value);
          }

          if (blockField) {
            updateCopyBlock(
              event.target.dataset.blockId,
              blockField,
              event.target.value,
            );
          }
        });

        projectView.addEventListener("keydown", (event) => {
          const checkField = event.target.dataset.checkField;
          if (checkField && event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            insertCheckItemAfter(
              event.target.dataset.noteId,
              event.target.dataset.checkId,
            );
          }
        });

        projectView.addEventListener("focusout", (event) => {
          if (event.target.dataset.checkField) {
            removeEmptyCheckItem(
              event.target.dataset.noteId,
              event.target.dataset.checkId,
            );
          }
        });

        projectView.addEventListener("dragstart", (event) => {
          const block = event.target.closest("[data-note-kind='checklist']");
          if (!block) return;

          draggedNoteId = block.dataset.noteId;
          block.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
        });

        projectView.addEventListener("dragover", (event) => {
          const block = event.target.closest("[data-note-kind='checklist']");
          if (
            !block ||
            !draggedNoteId ||
            block.dataset.noteId === draggedNoteId
          )
            return;

          event.preventDefault();
          const rect = block.getBoundingClientRect();
          const after = event.clientY > rect.top + rect.height / 2;
          block.classList.toggle("drop-before", !after);
          block.classList.toggle("drop-after", after);
        });

        projectView.addEventListener("dragleave", (event) => {
          const block = event.target.closest("[data-note-kind='checklist']");
          if (!block) return;

          block.classList.remove("drop-before", "drop-after");
        });

        projectView.addEventListener("drop", (event) => {
          const block = event.target.closest("[data-note-kind='checklist']");
          if (!block || !draggedNoteId) return;

          event.preventDefault();
          const after = block.classList.contains("drop-after");
          moveNoteBlock(draggedNoteId, block.dataset.noteId, after);
          draggedNoteId = "";
        });

        projectView.addEventListener("dragend", () => {
          draggedNoteId = "";
          projectView
            .querySelectorAll(".dragging, .drop-before, .drop-after")
            .forEach((element) => {
              element.classList.remove("dragging", "drop-before", "drop-after");
            });
        });

        projectView.addEventListener("click", (event) => {
          const button = event.target.closest("[data-command]");
          if (!button) return;

          const command = button.dataset.command;
          const blockId = button.dataset.blockId;

          if (command === "back-to-dashboard") backToDashboard();
          if (command === "open-project-info") openProjectInfo();
          if (command === "close-project-info") closeProjectInfo();
          if (command === "close-appearance-popup") closeAppearancePopup();
          if (command === "delete-active-project")
            deleteProject(activeProjectId);
          if (command === "toggle-menu") {
            activeCustomMenu =
              activeCustomMenu === button.dataset.menu
                ? ""
                : button.dataset.menu;
            activeAppearancePanel = "";
            renderProjectDetails();
          }
          if (command === "toggle-appearance-panel") {
            activeCustomMenu = "";
            activeAppearancePanel =
              activeAppearancePanel === button.dataset.panel
                ? ""
                : button.dataset.panel;
            renderProjectDetails();
          }
          if (command === "set-project-field")
            setProjectField(button.dataset.projectField, button.dataset.value);
          if (command === "set-project-icon")
            setProjectIcon(button.dataset.iconValue);
          if (command === "set-project-color")
            setProjectColor(button.dataset.colorValue);
          if (command === "icon-category") {
            iconPickerCategory = button.dataset.iconCategory;
            iconPickerPage = 0;
            renderProjectDetails();
          }
          if (command === "icon-page") {
            iconPickerPage += button.dataset.iconPage === "next" ? 1 : -1;
            renderProjectDetails();
          }
          if (command === "icon-page-number") {
            iconPickerPage = Number(button.dataset.iconPageNumber) || 0;
            renderProjectDetails();
          }
          if (command === "open-copy-block-popup") addCopyBlock("text");
          if (command === "add-copy-block")
            addCopyBlock(button.dataset.copyType);
          if (command === "close-copy-block-popup") closeCopyBlockPopup();
          if (command === "set-copy-draft-format")
            setCopyDraftFormat(button.dataset.format);
          if (command === "create-copy-block-from-popup")
            createCopyBlockFromPopup();
          if (command === "toggle-copy-edit-mode") {
            copyBlocksEditing = !copyBlocksEditing;
            renderProjectDetails();
          }
          if (command === "toggle-block") toggleCopyBlock(blockId);
          if (command === "edit-block") editCopyBlock(blockId);
          if (command === "set-block-format")
            updateCopyBlock(blockId, "format", button.dataset.format);
          if (command === "move-copy-block")
            moveCopyBlock(blockId, button.dataset.direction);
          if (command === "delete-block") deleteCopyBlock(blockId);
          if (command === "copy-block") copyBlockContent(blockId);
          if (command === "toggle-top-checklist") toggleTopChecklist();
          if (command === "delete-note-block")
            deleteNoteBlock(button.dataset.noteId);
          if (command === "add-check-item") addCheckItem(button.dataset.noteId);
          if (command === "toggle-check-item")
            toggleCheckItem(button.dataset.noteId, button.dataset.checkId);
          if (command === "delete-check-item")
            deleteCheckItem(button.dataset.noteId, button.dataset.checkId);
        });

        projectView.addEventListener("click", (event) => {
          const appearanceModal = event.target.closest(
            "[data-modal='appearance-picker']",
          );
          if (event.target === appearanceModal) {
            closeAppearancePopup();
            return;
          }

          const modal = event.target.closest("[data-modal='project-info']");
          if (event.target === modal) {
            closeProjectInfo();
          }

          const noteModal = event.target.closest(
            "[data-modal='expanded-note']",
          );
          if (event.target === noteModal) {
            closeExpandedNote();
          }
          const copyBlockModal = event.target.closest(
            "[data-modal='add-copy-block']",
          );
          if (event.target === copyBlockModal) {
            closeCopyBlockPopup();
          }
        });
      }

      function bootApp() {
        hydrateStaticIcons();
        bindAuthEvents();
        restoreSavedLogin();
        bindDashboardEvents();
        bindProjectEvents();
        renderDashboardProjectCards();
      }

      bootApp();
    </script>
  </body>
</html>
