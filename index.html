<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientFlow Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020b18;
      --sidebar: #071323;
      --panel: rgba(13, 25, 44, 0.86);
      --panel-2: rgba(17, 32, 55, 0.92);
      --border: rgba(126, 151, 190, 0.18);
      --text: #f6f8ff;
      --muted: #aeb8cb;
      --soft: #758299;
      --blue: #6b91ff;
      --purple: #a985ff;
      --green: #56df9a;
      --yellow: #ffba35;
      --danger: #ff3d55;
      --button: #2a3978;
      --button-hover: #33458d;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(56, 88, 160, 0.22), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(79, 39, 145, 0.16), transparent 30%),
        linear-gradient(180deg, #05101f 0%, #020812 100%);
    }

    body.locked .app {
      display: none;
    }

    body.logged-in .login-screen {
      display: none;
    }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(107, 145, 255, 0.2), transparent 35%),
        linear-gradient(180deg, #05101f 0%, #020812 100%);
    }

    .login-card {
      width: min(430px, 100%);
      padding: 34px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(9, 20, 37, 0.92);
      box-shadow: var(--shadow);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 28px;
      font-size: 24px;
      font-weight: 800;
    }

    .login-card h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.04em;
    }

    .login-card p {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .field label {
      color: #d9e0ef;
      font-size: 14px;
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(5, 15, 28, 0.95);
      color: var(--text);
      font: inherit;
      padding: 0 15px;
      outline: none;
    }

    .field input,
    .field select {
      height: 52px;
    }

    .field textarea {
      min-height: 132px;
      padding: 14px 15px;
      resize: vertical;
      line-height: 1.5;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(107, 145, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(107, 145, 255, 0.12);
    }

    .login-btn {
      width: 100%;
      height: 54px;
      margin-top: 8px;
      border: 1px solid rgba(138, 159, 255, 0.18);
      border-radius: 9px;
      background: linear-gradient(180deg, #344383, #26366f);
      color: white;
      font: inherit;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .login-btn:hover {
      background: linear-gradient(180deg, #40519a, #304182);
    }

    .login-error {
      min-height: 22px;
      margin-top: 15px;
      color: #ff7b8b;
      font-size: 14px;
      font-weight: 500;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 24px;
      background: rgba(5, 15, 28, 0.92);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 22px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(107, 145, 255, 0.65) rgba(255, 255, 255, 0.05);
    }

    .sidebar::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(107, 145, 255, 0.65);
      border-radius: 999px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(107, 145, 255, 0.9);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      background:
        linear-gradient(135deg, #7ea0ff 0 45%, transparent 45%),
        linear-gradient(225deg, #385cf4 0 45%, transparent 45%),
        linear-gradient(315deg, #8d65ff 0 45%, transparent 45%);
      box-shadow: 0 10px 30px rgba(91, 123, 255, 0.35);
      flex-shrink: 0;
    }

    .section-title {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 8px 0 8px;
    }

    .quick-actions,
    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action,
    .nav-item {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(19, 34, 58, 0.7);
      color: var(--text);
      border-radius: 9px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 13px;
      font: inherit;
      cursor: pointer;
      transition: 0.2s ease;
      text-align: left;
    }

    .action:hover,
    .nav-item:hover {
      background: rgba(40, 61, 98, 0.75);
      transform: translateY(-1px);
    }

    .action svg,
    .nav-item svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .chevron {
      margin-left: auto;
      color: var(--muted);
      font-size: 24px;
      line-height: 0;
    }

    .nav {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      flex-shrink: 0;
    }

    .nav-item {
      border-color: transparent;
      background: transparent;
      color: #c8d0df;
    }

    .nav-item.active {
      color: var(--blue);
      border-color: rgba(107, 145, 255, 0.28);
      background: linear-gradient(90deg, rgba(55, 91, 170, 0.55), rgba(44, 57, 105, 0.35));
    }

    .profile {
      border-top: 1px solid var(--border);
      padding-top: 18px;
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f0b18d, #5e3321);
      color: #111;
      font-weight: 800;
      border: 2px solid rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
    }

    .profile strong {
      display: block;
      font-size: 15px;
    }

    .profile span {
      color: var(--muted);
      font-size: 13px;
    }

    .logout-btn {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(255, 61, 85, 0.25);
      border-radius: 9px;
      background: rgba(255, 61, 85, 0.08);
      color: #ff9aa6;
      font: inherit;
      cursor: pointer;
      flex-shrink: 0;
    }

    .logout-btn:hover {
      background: rgba(255, 61, 85, 0.14);
    }

    main {
      padding: 24px 58px 50px 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 44px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 31px;
      letter-spacing: -0.04em;
    }

    .welcome {
      color: var(--muted);
      font-size: 18px;
      margin: 0;
    }

    .tools {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .search {
      width: min(420px, 40vw);
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(9, 20, 37, 0.85);
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .search input::placeholder {
      color: #9da8ba;
    }

    .bell {
      position: relative;
      color: #cfd7e7;
    }

    .bell svg {
      width: 30px;
      height: 30px;
    }

    .badge {
      position: absolute;
      right: -8px;
      top: -8px;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--danger);
      color: white;
      font-size: 12px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .card {
      aspect-ratio: 1;
      min-height: 0;
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background:
        linear-gradient(145deg, rgba(18, 31, 55, 0.92), rgba(7, 17, 32, 0.94)),
        var(--panel);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: 0.2s ease;
      overflow: hidden;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(107, 145, 255, 0.35);
    }

    .icon-box {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(135, 160, 208, 0.25);
      background: rgba(8, 19, 35, 0.58);
      margin-bottom: 18px;
    }

    .icon-box svg {
      width: 31px;
      height: 31px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 21px;
      letter-spacing: -0.04em;
    }

    .type {
      color: var(--blue);
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      margin: 0;
      display: none;
    }

    .status {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c8d0df;
      font-size: 15px;
      padding-top: 14px;
    }

    .card.expanded .desc {
      display: block;
      max-height: 72px;
      overflow: hidden;
    }

    .card.expanded .desc.overflowing {
      margin: auto -20px -20px;
      padding: 14px 20px 16px;
      color: #dce5ff;
      background: linear-gradient(180deg, rgba(5, 15, 28, 0), rgba(5, 15, 28, 0.94) 28%, rgba(5, 15, 28, 0.98));
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--blue);
    }

    .dot.yellow { background: var(--yellow); }
    .dot.purple { background: var(--purple); }
    .dot.cyan { background: #62c6d7; }
    .dot.green { background: #66d48a; }
    .dot.danger { background: var(--danger); }

    .open-btn {
      margin-top: 14px;
      width: 100%;
      height: 54px;
      border: 1px solid rgba(138, 159, 255, 0.18);
      border-radius: 7px;
      background: linear-gradient(180deg, #344383, #26366f);
      color: white;
      font: inherit;
      font-size: 17px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .open-btn:hover {
      background: linear-gradient(180deg, #40519a, #304182);
    }

    .add-project-card {
      aspect-ratio: 1;
      min-height: 0;
      border-radius: var(--radius);
      border: 1px dashed rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.82);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-project-card:hover {
      border-color: rgba(107, 145, 255, 0.48);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
    }

    .add-project-plus {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.06);
    }

    .add-project-plus svg {
      width: 34px;
      height: 34px;
    }

    .card-delete-btn {
      align-self: flex-end;
      width: 42px;
      height: 42px;
      margin: -8px -8px 8px 0;
      border-radius: 9px;
      display: grid;
      place-items: center;
    }

    .project-page {
      display: grid;
      gap: 22px;
    }

    .project-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 8px;
    }

    .project-heading {
      min-width: 0;
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .project-heading .icon-box {
      margin: 0;
      flex: 0 0 auto;
    }

    .project-title-input {
      width: min(620px, 100%);
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
      padding: 0;
    }

    .project-title-input:focus {
      color: white;
      text-shadow: 0 0 26px rgba(107, 145, 255, 0.26);
    }

    .back-btn,
    .small-btn,
    .add-block-btn,
    .control-btn,
    .picker-option,
    .icon-category,
    .icon-choice,
    .color-swatch,
    .icon-page-button,
    .icon-page-number,
    .format-choice,
    .check-toggle {
      border: 1px solid rgba(138, 159, 255, 0.18);
      border-radius: 7px;
      color: white;
      font: inherit;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .back-btn,
    .small-btn,
    .add-block-btn {
      background: linear-gradient(180deg, #344383, #26366f);
    }

    .back-btn {
      min-width: 132px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .small-btn {
      min-height: 38px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .add-block-btn {
      height: 48px;
      padding: 0 18px;
      font-weight: 600;
      justify-self: start;
    }

    .back-btn:hover,
    .small-btn:hover,
    .add-block-btn:hover,
    .control-btn:hover,
    .picker-option:hover,
    .icon-category:hover,
    .icon-choice:hover,
    .icon-page-button:hover,
    .icon-page-number:hover,
    .format-choice:hover {
      background: linear-gradient(180deg, #40519a, #304182);
    }

    .back-btn svg,
    .small-btn svg,
    .add-block-btn svg,
    .copy-button svg,
    .control-btn svg,
    .picker-option svg,
    .icon-choice svg,
    .check-toggle svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .small-btn.danger {
      border-color: rgba(255, 61, 85, 0.25);
      background: rgba(255, 61, 85, 0.08);
      color: #ff9aa6;
    }

    .small-btn.danger:hover {
      background: rgba(255, 61, 85, 0.14);
    }

    .project-status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      color: #c8d0df;
      font-size: 15px;
    }

    .save-state {
      margin-left: 4px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
    }

    .project-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .project-panel {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background:
        linear-gradient(145deg, rgba(18, 31, 55, 0.92), rgba(7, 17, 32, 0.94)),
        var(--panel);
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .project-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 20px;
    }

    .project-form-grid .wide {
      grid-column: 1 / -1;
    }

    .inline-editor {
      display: grid;
      grid-template-columns: minmax(160px, 260px) minmax(160px, 260px) 70px;
      gap: 16px;
      align-items: end;
    }

    .icon-preview {
      width: 70px;
      height: 70px;
      margin: 0;
    }

    .copy-section {
      display: grid;
      gap: 16px;
    }

    .copy-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .copy-section h2,
    .project-panel h2 {
      margin: 0 0 18px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .copy-section h2 {
      margin: 0;
    }

    .add-menu-wrap {
      position: relative;
      display: inline-flex;
    }

    .add-menu-wrap .custom-menu {
      min-width: 210px;
      left: auto;
      right: 0;
      top: calc(100% + 8px);
    }

    .copy-block {
      min-height: 246px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(9, 20, 37, 0.72);
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(92px, 1fr) auto;
      gap: 14px;
    }

    .copy-block.edit-compact {
      min-height: 74px;
      grid-template-rows: auto;
      align-items: center;
    }

    .copy-block-top,
    .copy-block-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .copy-block-title {
      min-width: 0;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .copy-reorder {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .copy-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(138, 159, 255, 0.18);
      border-radius: 9px;
      background: rgba(19, 34, 58, 0.7);
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .block-icon-button {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .copy-button:hover {
      background: rgba(40, 61, 98, 0.75);
      transform: translateY(-1px);
    }

    .copy-confirm {
      min-width: 66px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .copy-preview {
      min-height: 92px;
      max-height: 92px;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      overflow: hidden;
      cursor: pointer;
    }

    .copy-preview.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .copy-preview.expanded {
      max-height: none;
      overflow: visible;
    }

    .copy-preview.code {
      padding: 15px;
      border: 1px solid rgba(126, 151, 190, 0.18);
      border-radius: 9px;
      background: rgba(5, 15, 28, 0.95);
      color: #dce5ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
    }

    .copy-edit-grid {
      display: grid;
      gap: 14px;
    }

    .copy-edit-row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 14px;
    }

    .format-row {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    .format-choice {
      min-height: 42px;
      padding: 0 14px;
      background: rgba(19, 34, 58, 0.7);
    }

    .format-choice.active {
      border-color: rgba(107, 145, 255, 0.52);
      background: linear-gradient(180deg, #344383, #26366f);
    }

    .notes-grid,
    .copy-block-grid {
      display: grid;
      gap: 16px;
    }

    .note-block {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(9, 20, 37, 0.72);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .note-preview {
      min-height: 96px;
      max-height: 118px;
      border: 1px dashed rgba(126, 151, 190, 0.28);
      border-radius: 12px;
      padding: 18px;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow: hidden;
      overflow-wrap: anywhere;
      cursor: pointer;
    }

    .note-preview.empty {
      display: grid;
      place-items: center;
      color: #dce5ff;
      background: rgba(255, 255, 255, 0.035);
    }

    .note-copy-inline {
      justify-self: end;
    }

    .note-preview.expanded {
      max-height: none;
    }

    .note-popup-field {
      width: 100%;
      min-height: min(56vh, 560px);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(5, 15, 28, 0.95);
      color: var(--text);
      font: inherit;
      line-height: 1.55;
      padding: 16px;
      resize: vertical;
      outline: none;
    }

    .note-title-row,
    .check-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .check-row {
      overflow: visible;
    }

    .note-title-row {
      justify-content: space-between;
    }

    .check-list {
      display: grid;
      gap: 10px;
    }

    .check-toggle {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 9px;
      background: rgba(19, 34, 58, 0.7);
      flex: 0 0 auto;
    }

    .check-toggle.checked {
      background: linear-gradient(180deg, #344383, #26366f);
      border-color: rgba(107, 145, 255, 0.52);
    }

    .check-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(5, 15, 28, 0.95);
      color: var(--text);
      font: inherit;
      padding: 0 12px;
      outline: none;
      overflow: visible;
    }

    .check-input.wrap {
      min-height: 42px;
      height: auto;
      padding: 10px 12px;
      white-space: normal;
      overflow: visible;
      line-height: 1.35;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(2, 8, 18, 0.72);
      backdrop-filter: blur(10px);
    }

    .modal.open {
      display: grid;
    }

    .sheet {
      width: min(760px, 100%);
      max-height: min(780px, calc(100vh - 44px));
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(18, 31, 55, 0.97), rgba(7, 17, 32, 0.98)),
        var(--panel);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .sheet.compact {
      width: min(520px, 100%);
    }

    .sheet.expanded-note {
      width: min(1040px, 100%);
      min-height: min(760px, calc(100vh - 44px));
      display: flex;
      flex-direction: column;
    }

    .sheet.expanded-note .note-popup-body {
      display: grid;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .sheet-head h2 {
      margin: 0;
      font-size: 23px;
      letter-spacing: -0.03em;
    }

    .control-stack {
      display: grid;
      gap: 9px;
      position: relative;
    }

    .control-stack > label {
      color: #d9e0ef;
      font-size: 14px;
      font-weight: 600;
    }

    .control-btn {
      width: 100%;
      min-height: 52px;
      padding: 0 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      background: rgba(5, 15, 28, 0.95);
      border-color: var(--border);
      border-radius: 9px;
    }

    .control-value {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .custom-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      z-index: 40;
      display: none;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(5, 15, 28, 0.98);
      box-shadow: var(--shadow);
    }

    .custom-menu.open {
      display: grid;
    }

    .picker-option {
      min-height: 46px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      background: rgba(19, 34, 58, 0.7);
      border-color: rgba(126, 151, 190, 0.18);
    }

    .picker-option.active {
      border-color: rgba(107, 145, 255, 0.52);
      background: linear-gradient(90deg, rgba(55, 91, 170, 0.55), rgba(44, 57, 105, 0.35));
    }

    .status-dot-option {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--blue);
    }

    .icon-picker,
    .color-picker {
      display: grid;
      gap: 10px;
    }

    .icon-category-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .icon-category {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 8px;
      background: rgba(19, 34, 58, 0.7);
      border-color: rgba(126, 151, 190, 0.18);
      font-size: 12px;
      font-weight: 700;
    }

    .icon-category.active,
    .icon-choice.active,
    .icon-page-number.active {
      border-color: rgba(107, 145, 255, 0.52);
      background: linear-gradient(180deg, #344383, #26366f);
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(40px, 1fr));
      gap: 8px;
    }

    .icon-choice {
      aspect-ratio: 1;
      min-height: 42px;
      display: grid;
      place-items: center;
      background: rgba(19, 34, 58, 0.7);
      border-color: rgba(126, 151, 190, 0.18);
      border-radius: 12px;
    }

    .icon-pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .icon-page-button,
    .icon-page-number {
      min-width: 36px;
      height: 34px;
      background: rgba(19, 34, 58, 0.7);
      border-color: rgba(126, 151, 190, 0.18);
    }

    .icon-page-button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(30px, 1fr));
      gap: 9px;
    }

    .color-swatch {
      aspect-ratio: 1;
      border-radius: 50%;
      min-height: 38px;
      background: var(--swatch);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.14), 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .color-swatch.active {
      box-shadow: inset 0 0 0 3px #fff, 0 0 0 2px rgba(107, 145, 255, 0.42), 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .empty-blocks {
      color: var(--muted);
      border: 1px dashed rgba(126, 151, 190, 0.25);
      border-radius: 12px;
      padding: 22px;
      text-align: center;
    }

    .blue { color: var(--blue); }
    .purple { color: var(--purple); }
    .green { color: var(--green); }
    .yellow { color: var(--yellow); }
    .cyan { color: #62c6d7; }
    .pink { color: #ff74ba; }
    .orange { color: #ff9a52; }
    .red { color: var(--danger); }
    .white { color: #ffffff; }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: 240px 1fr;
      }

      main {
        padding-right: 28px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(260px, 1fr));
      }
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        max-height: none;
      }

      main {
        padding: 26px 20px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .project-top,
      .copy-section-head,
      .copy-block-top,
      .copy-block-actions,
      .note-title-row {
        align-items: stretch;
        flex-direction: column;
      }

      .project-actions {
        width: 100%;
      }

      .project-actions .back-btn {
        flex: 1;
      }

      .project-heading {
        align-items: flex-start;
      }

      .project-title-input {
        font-size: 29px;
      }

      .project-form-grid,
      .inline-editor,
      .copy-edit-row,
      .icon-category-row {
        grid-template-columns: 1fr;
      }

      .icon-grid {
        grid-template-columns: repeat(4, minmax(46px, 1fr));
      }

      .color-grid {
        grid-template-columns: repeat(3, minmax(42px, 1fr));
      }

      .project-form-grid .wide {
        grid-column: auto;
      }

      .tools,
      .search {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script>
    const VALID_USER = "dev";
    const VALID_PASSWORD = "password";

    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginError = document.getElementById("loginError");
    const welcomeName = document.getElementById("welcomeName");
    const sidebarUserName = document.getElementById("sidebarUserName");
    const userAvatar = document.getElementById("userAvatar");
    const logoutBtn = document.getElementById("logoutBtn");

    function setLoggedInUser(username) {
      const displayName = username.toUpperCase();

      welcomeName.textContent = displayName;
      sidebarUserName.textContent = displayName;
      userAvatar.textContent = displayName.slice(0, 2);

      document.body.classList.remove("locked");
      document.body.classList.add("logged-in");

      localStorage.setItem("clientflow_user", displayName);
    }

    function logout() {
      localStorage.removeItem("clientflow_user");

      document.body.classList.remove("logged-in");
      document.body.classList.add("locked");

      usernameInput.value = "";
      passwordInput.value = "";
      loginError.textContent = "";
      usernameInput.focus();
    }

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (username.toLowerCase() === VALID_USER && password === VALID_PASSWORD) {
        setLoggedInUser(username);
        return;
      }

      loginError.textContent = "Invalid user or password.";
    });

    logoutBtn.addEventListener("click", logout);

    const savedUser = localStorage.getItem("clientflow_user");

    if (savedUser) {
      setLoggedInUser(savedUser);

    function cleanProject(project, fallback) {
      const cleaned = { ...fallback, ...project };
      cleaned.id = cleaned.id || uid();
      cleaned.title = cleaned.title || "Untitled Project";
      cleaned.task = TASK_OPTIONS.includes(cleaned.task) ? cleaned.task : "Other";
      cleaned.customTask = cleaned.customTask || "";
      cleaned.description = cleaned.description || "";
      cleaned.status = STATUS_OPTIONS.includes(cleaned.status) ? cleaned.status : "Pending";
      cleaned.icon = ICON_OPTIONS.includes(cleaned.icon) ? cleaned.icon : "file";
      cleaned.color = COLOR_OPTIONS.some((color) => color.id === cleaned.color) ? cleaned.color : "blue";
      cleaned.copyBlocks = Array.isArray(cleaned.copyBlocks) ? cleaned.copyBlocks.map(cleanBlock) : [];
      cleaned.noteBlocks = Array.isArray(cleaned.noteBlocks) ? cleaned.noteBlocks.map(cleanNoteBlock) : [];
      return cleaned;
    }

    function cleanBlock(block) {
      return {
        id: block.id || uid(),
        label: block.label || "Copy Block",
        content: block.content || "",
        format: block.format === "code" ? "code" : "text",
        expanded: Boolean(block.expanded),
        editing: Boolean(block.editing),
        copied: false
      };
    }

    function cleanNoteBlock(block) {
      const isLegacyChecklist = !block.type && Array.isArray(block.items);
      const type = block.type === "note" && !isLegacyChecklist ? "note" : "checklist";

      return {
        id: block.id || uid(),
        type,
        title: block.title || "Note Block",
        content: block.content || "",
        expanded: Boolean(block.expanded),
        items: Array.isArray(block.items) && block.items.length
          ? block.items.map((item) => ({
              id: item.id || uid(),
              text: item.text || "",
              checked: Boolean(item.checked)
            }))
          : [{ id: uid(), text: "", checked: false }]
      };
    }

    function loadProjects() {
      const defaults = defaultProjects();

      try {
        const saved = JSON.parse(localStorage.getItem(PROJECT_STORAGE_KEY));
        if (Array.isArray(saved)) {
          const fallbackById = new Map(defaults.map((project) => [project.id, project]));
          return saved.map((project, index) => cleanProject(project, fallbackById.get(project.id) || defaults[index] || {}));
        }
      } catch (error) {
        console.warn("Unable to load ClientFlow projects.", error);
      }

      return defaults;
    }

    function saveProjects() {
      const storable = projects.map((project) => ({
        ...project,
        copyBlocks: project.copyBlocks.map(({ copied, editing, ...block }) => block)
      }));

      localStorage.setItem(PROJECT_STORAGE_KEY, JSON.stringify(storable));
      showSaveState();
    }

    function showSaveState() {
      const state = document.getElementById("saveState");
      if (!state) return;

      state.textContent = "Saved";
      window.clearTimeout(saveMessageTimer);
      saveMessageTimer = window.setTimeout(() => {
        const nextState = document.getElementById("saveState");
        if (nextState) nextState.textContent = "";
      }, 1400);
    }

      return project.task === "Other" ? project.customTask || "Other" : project.task;

      const dotClass = STATUS_DOT_CLASS[status] || "";
      return `<span class="dot ${dotClass}"></span>`;

    function statusDotStyle(status) {
      const dotClass = STATUS_DOT_CLASS[status] || "";
      const colorMap = {
        yellow: "var(--yellow)",
        purple: "var(--purple)",
        cyan: "#62c6d7",
        green: "#66d48a",
        danger: "var(--danger)"
      };

      return colorMap[dotClass] || "var(--blue)";
    }

    function colorValue(colorId) {
      return COLOR_OPTIONS.find((color) => color.id === colorId)?.value || "var(--blue)";
    }

    function loadRecentIcons() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ICON_RECENTS_KEY) || "[]");
        return Array.isArray(parsed) ? parsed.filter((icon) => ICON_OPTIONS.includes(icon)).slice(0, 12) : [];
      } catch {
        return [];
      }
    }

    function rememberIcon(icon) {
      localStorage.setItem(
        ICON_RECENTS_KEY,
        JSON.stringify([icon, ...loadRecentIcons().filter((item) => item !== icon)].slice(0, 12))
      );
    }

    function categoryIcons(categoryId) {
      if (categoryId === "recents") {
        const recents = loadRecentIcons();
        const fill = ICON_OPTIONS.filter((icon) => !recents.includes(icon));
        return [...recents, ...fill].slice(0, 12);
      }

      return ICON_GROUPS[categoryId] || [];
    }

          <button class="control-btn" type="button" data-command="toggle-menu" data-menu="${escapeHtml(menuId)}">
            <span class="control-value">
              ${withStatusDots ? `<span class="status-dot-option" style="background:${statusDotStyle(value)}"></span>` : ""}
              ${escapeHtml(selectedLabel)}
            </span>
            <span class="chevron">⌄</span>
          </button>
          <div class="custom-menu ${activeCustomMenu === menuId ? "open" : ""}" data-menu-panel="${escapeHtml(menuId)}">
            ${options.map((option) => `
              <button class="picker-option ${option.value === value ? "active" : ""}" type="button" data-command="set-project-field" data-project-field="${escapeHtml(field)}" data-value="${escapeHtml(option.value)}">
                <span class="control-value">
                  ${withStatusDots ? `<span class="status-dot-option" style="background:${statusDotStyle(option.value)}"></span>` : ""}
                  ${escapeHtml(option.label)}
                </span>
                ${option.value === value ? iconSvg("check") : ""}
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderIconPicker(project) {
      const iconsForCategory = categoryIcons(iconPickerCategory);
      const pageSize = iconPickerCategory === "recents" ? 12 : ICON_PAGE_SIZE;
      const pageCount = Math.max(1, Math.ceil(iconsForCategory.length / pageSize));
      iconPickerPage = Math.min(iconPickerPage, pageCount - 1);
      const visibleIcons = iconsForCategory.slice(iconPickerPage * pageSize, iconPickerPage * pageSize + pageSize);

      return `
        <div class="icon-picker">
          <div class="icon-category-row" role="tablist" aria-label="Icon categories">
            ${ICON_CATEGORIES.map((category) => `
              <button class="icon-category ${category.id === iconPickerCategory ? "active" : ""}" type="button" data-command="icon-category" data-icon-category="${escapeHtml(category.id)}">
                ${iconSvg(category.icon)}
                <span>${escapeHtml(category.label)}</span>
              </button>
            `).join("")}
          </div>

          <div class="icon-grid" role="group" aria-label="Project icon choices">
            ${visibleIcons.map((icon) => `
              <button class="icon-choice ${icon === project.icon ? "active" : ""}" type="button" data-command="set-project-icon" data-icon-value="${escapeHtml(icon)}" aria-label="${escapeHtml(icon)} icon">
                ${iconSvg(icon)}
              </button>
            `).join("")}
          </div>

          ${iconPickerCategory !== "recents" && pageCount > 1 ? `
            <div class="icon-pager" aria-label="Icon pages">
              <button class="icon-page-button" type="button" data-command="icon-page" data-icon-page="prev" ${iconPickerPage === 0 ? "disabled" : ""}>‹</button>
              ${Array.from({ length: pageCount }, (_, index) => `
                <button class="icon-page-number ${index === iconPickerPage ? "active" : ""}" type="button" data-command="icon-page-number" data-icon-page-number="${index}">${index + 1}</button>
              `).join("")}
              <button class="icon-page-button" type="button" data-command="icon-page" data-icon-page="next" ${iconPickerPage === pageCount - 1 ? "disabled" : ""}>›</button>
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderColorPicker(project) {
      return `
        <div class="color-picker">
          <div class="color-grid" role="group" aria-label="Icon colors">
            ${COLOR_OPTIONS.map((color) => `
              <button class="color-swatch ${project.color === color.id ? "active" : ""}" type="button" data-command="set-project-color" data-color-value="${escapeHtml(color.id)}" style="--swatch:${escapeHtml(color.value)}" aria-label="${escapeHtml(color.label)}"></button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderDashboardProjectCards() {
      const query = projectSearch.value.trim().toLowerCase();
      const visibleProjects = projects.filter((project) => {
        const haystack = `${project.title} ${taskLabel(project)} ${project.description} ${project.status}`.toLowerCase();
        return haystack.includes(query);
      });

      projectGrid.innerHTML = visibleProjects.map((project) => `
        <article class="card ${expandedProjectCardId === project.id ? "expanded" : ""}" data-project-card="${escapeHtml(project.id)}">
          ${dashboardEditing ? `<button class="small-btn danger card-delete-btn" type="button" data-delete-project="${escapeHtml(project.id)}" aria-label="Delete project">${iconSvg("trash")}</button>` : ""}
          <div class="icon-box ${escapeHtml(project.color)}">${iconSvg(project.icon)}</div>
          <h2>${escapeHtml(project.title)}</h2>
          <div class="type">${escapeHtml(taskLabel(project))}</div>
          <p class="desc ${project.description.length > 92 ? "overflowing" : ""}">${escapeHtml(project.description)}</p>
          <div class="status">
            ${dotHtml(project.status)}
            ${escapeHtml(project.status)}
          </div>
          ${expandedProjectCardId === project.id ? `<button class="open-btn" type="button" data-open-project="${escapeHtml(project.id)}">Open Project</button>` : ""}
        </article>
      `).join("") + `
        <button class="add-project-card" type="button" data-command="add-project" aria-label="Add project">
          <span class="add-project-plus">${iconSvg("plus")}</span>
        </button>
      `;

      dashboardEditBtn.textContent = dashboardEditing ? "Done Editing" : "Edit Projects";
    }

    function findProject(projectId) {
      return projects.find((project) => project.id === projectId);
    }

    function openProject(projectId) {
      activeProjectId = projectId;
      projectInfoOpen = false;
      expandedNoteId = null;
      activeCustomMenu = "";
      dashboardView.classList.remove("active");
      projectView.classList.add("active");
      renderProjectDetails();
      projectView.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function backToDashboard() {
      activeProjectId = null;
      expandedNoteId = null;
      projectInfoOpen = false;
      activeCustomMenu = "";
      projectView.classList.remove("active");
      dashboardView.classList.add("active");
      renderDashboardProjectCards();
      dashboardView.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function addProject() {
      const project = cleanProject({
        id: uid(),
        title: "New Project",
        task: "Other",
        customTask: "",
        description: "",
        status: "Pending",
        icon: "file",
        color: "white",
        copyBlocks: [],
        noteBlocks: []
      }, {});

      projects.push(project);
      saveProjects();
      renderDashboardProjectCards();
      openProject(project.id);
    }

    function deleteProject(projectId) {
      const index = projects.findIndex((project) => project.id === projectId);
      if (index < 0) return;

      projects.splice(index, 1);
      saveProjects();

      if (activeProjectId === projectId) {
        projectInfoOpen = false;
        expandedNoteId = null;
        backToDashboard();
        return;
      }

      renderDashboardProjectCards();
    }

    function renderProjectDetails() {
      const project = findProject(activeProjectId);
      if (!project) {
        backToDashboard();
        return;
      }

      projectView.innerHTML = `
        <div class="project-page">
          <div class="project-top">
            <div class="project-heading">
              <div class="icon-box icon-preview" style="color:${colorValue(project.color)}">${iconSvg(project.icon)}</div>
              <div>
                <input class="project-title-input" type="text" value="${escapeHtml(project.title)}" data-project-field="title" aria-label="Project title" />
                <div class="project-status-line">
                  ${dotHtml(project.status)}
                  <span>${escapeHtml(project.status)}</span>
                  <span class="save-state" id="saveState"></span>
                </div>
              </div>
            </div>
            <div class="project-actions">
              <button class="back-btn" type="button" data-command="open-project-info">${iconSvg("edit")} Edit</button>
              <button class="back-btn" type="button" data-command="back-to-dashboard">${iconSvg("arrow")} Back</button>
            </div>
          </div>

          <section class="project-panel copy-section">
            <div class="copy-section-head">
              <h2>Notes</h2>
              <div class="add-menu-wrap">
                <button class="add-block-btn" type="button" data-command="toggle-menu" data-menu="add-note-menu">${iconSvg("plus")} Add</button>
                <div class="custom-menu ${activeCustomMenu === "add-note-menu" ? "open" : ""}">
                  <button class="picker-option" type="button" data-command="add-note-block" data-note-type="note">${iconSvg("note")} Note</button>
                  <button class="picker-option" type="button" data-command="add-note-block" data-note-type="checklist">${iconSvg("check")} Checklist</button>
                </div>
              </div>
            </div>

            <div class="notes-grid" id="noteBlocks">
              ${renderNoteBlocks(project)}
            </div>
          </section>

          <section class="project-panel copy-section">
            <div class="copy-section-head">
              <h2>Copy Blocks</h2>
              <div class="copy-block-actions">
                ${project.copyBlocks.length ? `<button class="small-btn" type="button" data-command="toggle-copy-edit-mode">${copyBlocksEditing ? "Done" : "Edit"}</button>` : ""}
                <button class="add-block-btn" type="button" data-command="add-copy-block">${iconSvg("plus")} Add Copy Block</button>
              </div>
            </div>

            <div class="copy-block-grid" id="copyBlocks">
              ${renderCopyBlocks(project)}
            </div>
          </section>

          ${projectInfoOpen ? renderProjectInfoModal(project) : ""}
          ${expandedNoteId ? renderExpandedNoteModal(project) : ""}
        </div>
      `;
    }

    function renderProjectInfoModal(project) {
      return `
        <div class="modal open" data-modal="project-info">
          <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="projectInfoTitle">
            <div class="sheet-head">
              <h2 id="projectInfoTitle">Project Information</h2>
              <div class="copy-block-actions">
                <button class="small-btn danger" type="button" data-command="delete-active-project">${iconSvg("trash")} Delete Project</button>
                <button class="small-btn" type="button" data-command="close-project-info">${iconSvg("xmark")} Close</button>
              </div>
            </div>

            <div class="project-form-grid">
              ${renderMenuControl({
                label: "Current Task",
                field: "task",
                value: project.task,
                menuId: "task",
                options: TASK_OPTIONS.map((task) => ({ label: task, value: task }))
              })}

              ${renderMenuControl({
                label: "Status",
                field: "status",
                value: project.status,
                menuId: "status",
                withStatusDots: true,
                options: STATUS_OPTIONS.map((status) => ({ label: status, value: status }))
              })}

              <div class="field wide" ${project.task === "Other" ? "" : "hidden"}>
                <label for="customTask">Custom Task</label>
                <input id="customTask" type="text" value="${escapeHtml(project.customTask)}" data-project-field="customTask" placeholder="Custom project task" />
              </div>

              <div class="field wide">
                <label for="projectDescription">Project Description</label>
                <textarea id="projectDescription" data-project-field="description" placeholder="Project description">${escapeHtml(project.description)}</textarea>
              </div>

              <div class="control-stack wide">
                <label>Project Icon</label>
                ${renderIconPicker(project)}
              </div>

              <div class="control-stack wide">
                <label>Icon Color</label>
                ${renderColorPicker(project)}
              </div>
            </div>
          </section>
        </div>
      `;
    }

    function renderCopyBlocks(project) {
      if (!project.copyBlocks.length) {
        return `<div class="empty-blocks">No copy blocks yet.</div>`;
      }

      return project.copyBlocks.map((block, index) => {
        const collapsed = !block.expanded;
        const previewClass = `copy-preview ${block.format === "code" ? "code" : ""} ${collapsed ? "collapsed" : "expanded"}`;

        return `
          <article class="copy-block ${copyBlocksEditing ? "edit-compact" : ""}" data-block-id="${escapeHtml(block.id)}">
            <div class="copy-block-top">
              <div class="copy-block-title">${escapeHtml(block.label)}</div>
              <div class="copy-block-actions">
                ${copyBlocksEditing ? `
                  <div class="copy-reorder">
                    <button class="small-btn block-icon-button" type="button" data-command="move-copy-block" data-block-id="${escapeHtml(block.id)}" data-direction="up" ${index === 0 ? "disabled" : ""} aria-label="Move up">↑</button>
                    <button class="small-btn block-icon-button" type="button" data-command="move-copy-block" data-block-id="${escapeHtml(block.id)}" data-direction="down" ${index === project.copyBlocks.length - 1 ? "disabled" : ""} aria-label="Move down">↓</button>
                    <button class="small-btn danger block-icon-button" type="button" data-command="delete-block" data-block-id="${escapeHtml(block.id)}" aria-label="Delete block">${iconSvg("trash")}</button>
                  </div>
                ` : `
                  <span class="copy-confirm">${block.copied ? "Copied!" : ""}</span>
                  <button class="copy-button" type="button" data-command="copy-block" data-block-id="${escapeHtml(block.id)}" aria-label="Copy block">${iconSvg("copy")}</button>
                  <button class="small-btn block-icon-button" type="button" data-command="edit-block" data-block-id="${escapeHtml(block.id)}" aria-label="Edit all copy blocks">${iconSvg("edit")}</button>
                `}
              </div>
            </div>

            ${copyBlocksEditing ? "" : block.editing ? `
              <div class="copy-edit-grid">
                <div class="copy-edit-row">
                  <div class="field">
                    <label>Block Label</label>
                    <input type="text" value="${escapeHtml(block.label)}" data-block-field="label" data-block-id="${escapeHtml(block.id)}" />
                  </div>
                  <div class="control-stack">
                    <label>Format</label>
                    <div class="format-row">
                      <button class="format-choice ${block.format === "text" ? "active" : ""}" type="button" data-command="set-block-format" data-block-id="${escapeHtml(block.id)}" data-format="text">Text</button>
                      <button class="format-choice ${block.format === "code" ? "active" : ""}" type="button" data-command="set-block-format" data-block-id="${escapeHtml(block.id)}" data-format="code">Code</button>
                    </div>
                  </div>
                </div>
                <div class="field">
                  <label>Content</label>
                  <textarea data-block-field="content" data-block-id="${escapeHtml(block.id)}" placeholder="Paste reusable content here">${escapeHtml(block.content)}</textarea>
                </div>
              </div>
            ` : `
              <div class="${previewClass}" data-command="toggle-block" data-block-id="${escapeHtml(block.id)}" title="${collapsed ? "Expand" : "Collapse"}">${escapeHtml(block.content || "Empty copy block.")}</div>
            `}

            ${copyBlocksEditing ? "" : `
              <div class="copy-block-actions">
                <button class="small-btn" type="button" data-command="toggle-block" data-block-id="${escapeHtml(block.id)}">${block.expanded ? "Collapse" : "Expand"}</button>
              </div>
            `}
          </article>
        `;
      }).join("");
    }

    function renderNoteBlocks(project) {
      if (!project.noteBlocks.length) {
        return `<div class="empty-blocks">No notes yet.</div>`;
      }

      return project.noteBlocks.map((block) => {
        const isNote = block.type === "note";

        return `
          <article class="note-block" data-note-id="${escapeHtml(block.id)}" data-note-kind="${escapeHtml(block.type)}" ${!isNote ? `draggable="true"` : ""}>
            <div class="note-title-row">
              <div></div>
              <div class="copy-block-actions">
                ${isNote && block.content ? `<button class="small-btn note-copy-inline" type="button" data-command="copy-note" data-note-id="${escapeHtml(block.id)}">${iconSvg("copy")} Copy</button>` : ""}
                ${!isNote ? `<button class="small-btn" type="button" data-command="add-check-item" data-note-id="${escapeHtml(block.id)}">${iconSvg("plus")} Checkbox</button>` : ""}
                <button class="small-btn danger" type="button" data-command="delete-note-block" data-note-id="${escapeHtml(block.id)}">${iconSvg("trash")} Delete</button>
              </div>
            </div>

            ${isNote ? `
              <div class="note-preview ${block.content ? "" : "empty"}" data-command="expand-note" data-note-id="${escapeHtml(block.id)}">
                ${block.content ? escapeHtml(block.content) : `<span class="add-project-plus">${iconSvg("plus")}</span><span>Tap to write</span>`}
              </div>
            ` : `
              <div class="check-list">
                ${block.items.map((item) => `
                  <div class="check-row" data-check-id="${escapeHtml(item.id)}">
                    <button class="check-toggle ${item.checked ? "checked" : ""}" type="button" data-command="toggle-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Toggle checkbox">${item.checked ? iconSvg("check") : ""}</button>
                    <textarea class="check-input wrap" rows="1" data-check-field="text" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" placeholder="Checkbox item">${escapeHtml(item.text)}</textarea>
                    <button class="small-btn danger block-icon-button" type="button" data-command="delete-check-item" data-note-id="${escapeHtml(block.id)}" data-check-id="${escapeHtml(item.id)}" aria-label="Delete checkbox">${iconSvg("trash")}</button>
                  </div>
                `).join("")}
              </div>
            `}
          </article>
        `;
      }).join("");
    }

    function renderExpandedNoteModal(project) {
      const note = project.noteBlocks.find((block) => block.id === expandedNoteId);
      if (!note) return "";

      return `
        <div class="modal open" data-modal="expanded-note">
          <section class="sheet expanded-note" role="dialog" aria-modal="true" aria-labelledby="expandedNoteTitle">
            <div class="sheet-head">
              <h2 id="expandedNoteTitle">Note</h2>
              <button class="small-btn" type="button" data-command="close-expanded-note">${iconSvg("xmark")} Close</button>
            </div>
            <div class="note-popup-body">
              <textarea class="note-popup-field" data-note-field="content" data-note-id="${escapeHtml(note.id)}">${escapeHtml(note.content || "")}</textarea>
            </div>
          </section>
        </div>
      `;
    }

    function saveProjectUpdates(field, value, shouldRender = false) {
      const project = findProject(activeProjectId);
      if (!project) return;

      project[field] = value;

      if (field === "task" && value !== "Other") {
        project.customTask = "";
      }

      saveProjects();
      if (shouldRender) {
        renderProjectDetails();
      }
    }

    function openProjectInfo() {
      projectInfoOpen = true;
      activeCustomMenu = "";
      renderProjectDetails();
    }

    function closeProjectInfo() {
      projectInfoOpen = false;
      activeCustomMenu = "";
      renderProjectDetails();
    }

    function setProjectField(field, value) {
      saveProjectUpdates(field, value);
      activeCustomMenu = "";
      renderProjectDetails();
    }

    function setProjectIcon(icon) {
      saveProjectUpdates("icon", icon);
      rememberIcon(icon);
      renderProjectDetails();
    }

    function setProjectColor(color) {
      saveProjectUpdates("color", color);
      renderProjectDetails();
    }

    function addCopyBlock() {
      const project = findProject(activeProjectId);
      if (!project) return;

      project.copyBlocks.unshift({
        id: uid(),
        label: "New Copy Block",
        content: "",
        format: "text",
        expanded: false,
        editing: false,
        copied: false
      });

      saveProjects();
      renderProjectDetails();
    }

    function updateCopyBlock(blockId, field, value) {
      const project = findProject(activeProjectId);
      const block = project?.copyBlocks.find((item) => item.id === blockId);
      if (!block) return;

      block[field] = value;
      saveProjects();

      if (field === "format") {
        renderProjectDetails();
      }
    }

    function addNoteBlock(type = "note") {
      const project = findProject(activeProjectId);
      if (!project) return;

      project.noteBlocks.unshift({
        id: uid(),
        type: type === "checklist" ? "checklist" : "note",
        title: type === "checklist" ? "Checklist" : "Note",
        content: "",
        expanded: false,
        items: [{ id: uid(), text: "", checked: false }]
      });

      activeCustomMenu = "";
      saveProjects();
      renderProjectDetails();
    }

    function updateNoteBlock(noteId, field, value) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      if (!note) return;

      note[field] = value;
      saveProjects();
    }

    function deleteNoteBlock(noteId) {
      const project = findProject(activeProjectId);
      if (!project) return;

      project.noteBlocks = project.noteBlocks.filter((note) => note.id !== noteId);
      saveProjects();
      renderProjectDetails();
    }

    function addCheckItem(noteId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      if (!note) return;

      note.items.push({ id: uid(), text: "", checked: false });
      saveProjects();
      renderProjectDetails();
    }

    function updateCheckItem(noteId, checkId, field, value) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      const item = note?.items.find((check) => check.id === checkId);
      if (!item) return;

      item[field] = value;
      saveProjects();
    }

    function removeEmptyCheckItem(noteId, checkId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      const item = note?.items.find((check) => check.id === checkId);
      if (!note || !item || item.text.trim()) return;

      note.items = note.items.filter((check) => check.id !== checkId);
      if (!note.items.length) note.items.push({ id: uid(), text: "", checked: false });
      saveProjects();
      renderProjectDetails();
    }

    function toggleCheckItem(noteId, checkId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      const item = note?.items.find((check) => check.id === checkId);
      if (!item) return;

      item.checked = !item.checked;
      saveProjects();
      renderProjectDetails();
    }

    function deleteCheckItem(noteId, checkId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      if (!note) return;

      note.items = note.items.filter((item) => item.id !== checkId);
      if (!note.items.length) note.items.push({ id: uid(), text: "", checked: false });
      saveProjects();
      renderProjectDetails();
    }

    function insertCheckItemAfter(noteId, checkId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((item) => item.id === noteId);
      if (!note) return;

      const index = note.items.findIndex((item) => item.id === checkId);
      const next = { id: uid(), text: "", checked: false };
      note.items.splice(index >= 0 ? index + 1 : note.items.length, 0, next);
      saveProjects();
      renderProjectDetails();

      window.requestAnimationFrame(() => {
        document.querySelector(`[data-check-id="${next.id}"][data-check-field="text"]`)?.focus();
      });
    }

    function expandNote(noteId) {
      expandedNoteId = noteId;
      renderProjectDetails();
    }

    function closeExpandedNote() {
      expandedNoteId = null;
      renderProjectDetails();
    }

    async function copyNoteContent(noteId) {
      const project = findProject(activeProjectId);
      const note = project?.noteBlocks.find((block) => block.id === noteId);
      if (!note) return;

      try {
        await navigator.clipboard.writeText(note.content || "");
      } catch {
        const helper = document.createElement("textarea");
        helper.value = note.content || "";
        helper.style.position = "fixed";
        helper.style.opacity = "0";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
    }

    function moveNoteBlock(sourceId, targetId, afterTarget = false) {
      const project = findProject(activeProjectId);
      if (!project || sourceId === targetId) return;

      const sourceIndex = project.noteBlocks.findIndex((block) => block.id === sourceId);
      const targetIndex = project.noteBlocks.findIndex((block) => block.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;

      const [source] = project.noteBlocks.splice(sourceIndex, 1);
      const adjustedTarget = project.noteBlocks.findIndex((block) => block.id === targetId);
      project.noteBlocks.splice(afterTarget ? adjustedTarget + 1 : adjustedTarget, 0, source);
      saveProjects();
      renderProjectDetails();
    }

    function toggleCopyBlock(blockId) {
      const project = findProject(activeProjectId);
      const block = project?.copyBlocks.find((item) => item.id === blockId);
      if (!block) return;

      block.expanded = !block.expanded;
      saveProjects();
      renderProjectDetails();
    }

    function editCopyBlock(blockId) {
      const project = findProject(activeProjectId);
      if (!project?.copyBlocks.length) return;

      copyBlocksEditing = !copyBlocksEditing;
      project.copyBlocks.forEach((block) => {
        block.editing = false;
      });
      saveProjects();
      renderProjectDetails();
    }

    function moveCopyBlock(blockId, direction) {
      const project = findProject(activeProjectId);
      if (!project) return;

      const index = project.copyBlocks.findIndex((block) => block.id === blockId);
      const nextIndex = direction === "up" ? index - 1 : index + 1;

      if (index < 0 || nextIndex < 0 || nextIndex >= project.copyBlocks.length) return;

      const [block] = project.copyBlocks.splice(index, 1);
      project.copyBlocks.splice(nextIndex, 0, block);
      saveProjects();
      renderProjectDetails();
    }

    function deleteCopyBlock(blockId) {
      const project = findProject(activeProjectId);
      if (!project) return;

      project.copyBlocks = project.copyBlocks.filter((block) => block.id !== blockId);
      saveProjects();
      renderProjectDetails();
    }

    async function copyBlockContent(blockId) {
      const project = findProject(activeProjectId);
      const block = project?.copyBlocks.find((item) => item.id === blockId);
      if (!block) return;

      try {
        await navigator.clipboard.writeText(block.content);
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = block.content;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.opacity = "0";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }

      block.copied = true;
      renderProjectDetails();

      window.setTimeout(() => {
        block.copied = false;
        if (activeProjectId === project.id) renderProjectDetails();
      }, 1200);
    }

    document.querySelectorAll("[data-icon]").forEach((element) => {
      const name = element.dataset.icon;
      element.innerHTML = iconSvg(name);
    });

    projectSearch.addEventListener("input", renderDashboardProjectCards);

    dashboardEditBtn.addEventListener("click", () => {
      dashboardEditing = !dashboardEditing;
      renderDashboardProjectCards();
    });

    projectGrid.addEventListener("click", (event) => {
      const addButton = event.target.closest("[data-command='add-project']");
      const deleteButton = event.target.closest("[data-delete-project]");
      const button = event.target.closest("[data-open-project]");
      const card = event.target.closest("[data-project-card]");

      if (addButton) {
        addProject();
        return;
      }

      if (deleteButton) {
        deleteProject(deleteButton.dataset.deleteProject);
        return;
      }

      if (button) {
        openProject(button.dataset.openProject);
        return;
      }

      if (card) {
        expandedProjectCardId = expandedProjectCardId === card.dataset.projectCard ? "" : card.dataset.projectCard;
        renderDashboardProjectCards();
      }
    });

    projectView.addEventListener("input", (event) => {
      const projectField = event.target.dataset.projectField;
      const blockField = event.target.dataset.blockField;
      const noteField = event.target.dataset.noteField;
      const checkField = event.target.dataset.checkField;

      if (projectField) {
        saveProjectUpdates(projectField, event.target.value);
      }

      if (blockField) {
        updateCopyBlock(event.target.dataset.blockId, blockField, event.target.value);
      }

      if (noteField) {
        updateNoteBlock(event.target.dataset.noteId, noteField, event.target.value);
      }

      if (checkField) {
        updateCheckItem(event.target.dataset.noteId, event.target.dataset.checkId, checkField, event.target.value);
      }
    });

    projectView.addEventListener("change", (event) => {
      const projectField = event.target.dataset.projectField;
      const blockField = event.target.dataset.blockField;

      if (projectField) {
        saveProjectUpdates(projectField, event.target.value);
      }

      if (blockField) {
        updateCopyBlock(event.target.dataset.blockId, blockField, event.target.value);
      }
    });

    projectView.addEventListener("keydown", (event) => {
      const checkField = event.target.dataset.checkField;
      if (checkField && event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        insertCheckItemAfter(event.target.dataset.noteId, event.target.dataset.checkId);
      }
    });

    projectView.addEventListener("focusout", (event) => {
      if (event.target.dataset.checkField) {
        removeEmptyCheckItem(event.target.dataset.noteId, event.target.dataset.checkId);
      }
    });

    projectView.addEventListener("dragstart", (event) => {
      const block = event.target.closest("[data-note-kind='checklist']");
      if (!block) return;

      draggedNoteId = block.dataset.noteId;
      block.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
    });

    projectView.addEventListener("dragover", (event) => {
      const block = event.target.closest("[data-note-kind='checklist']");
      if (!block || !draggedNoteId || block.dataset.noteId === draggedNoteId) return;

      event.preventDefault();
      const rect = block.getBoundingClientRect();
      const after = event.clientY > rect.top + rect.height / 2;
      block.classList.toggle("drop-before", !after);
      block.classList.toggle("drop-after", after);
    });

    projectView.addEventListener("dragleave", (event) => {
      const block = event.target.closest("[data-note-kind='checklist']");
      if (!block) return;

      block.classList.remove("drop-before", "drop-after");
    });

    projectView.addEventListener("drop", (event) => {
      const block = event.target.closest("[data-note-kind='checklist']");
      if (!block || !draggedNoteId) return;

      event.preventDefault();
      const after = block.classList.contains("drop-after");
      moveNoteBlock(draggedNoteId, block.dataset.noteId, after);
      draggedNoteId = "";
    });

    projectView.addEventListener("dragend", () => {
      draggedNoteId = "";
      projectView.querySelectorAll(".dragging, .drop-before, .drop-after").forEach((element) => {
        element.classList.remove("dragging", "drop-before", "drop-after");
      });
    });

    projectView.addEventListener("click", (event) => {
      const button = event.target.closest("[data-command]");
      if (!button) return;

      const command = button.dataset.command;
      const blockId = button.dataset.blockId;

      if (command === "back-to-dashboard") backToDashboard();
      if (command === "open-project-info") openProjectInfo();
      if (command === "close-project-info") closeProjectInfo();
      if (command === "delete-active-project") deleteProject(activeProjectId);
      if (command === "toggle-menu") {
        activeCustomMenu = activeCustomMenu === button.dataset.menu ? "" : button.dataset.menu;
        renderProjectDetails();
      }
      if (command === "set-project-field") setProjectField(button.dataset.projectField, button.dataset.value);
      if (command === "set-project-icon") setProjectIcon(button.dataset.iconValue);
      if (command === "set-project-color") setProjectColor(button.dataset.colorValue);
      if (command === "icon-category") {
        iconPickerCategory = button.dataset.iconCategory;
        iconPickerPage = 0;
        renderProjectDetails();
      }
      if (command === "icon-page") {
        iconPickerPage += button.dataset.iconPage === "next" ? 1 : -1;
        renderProjectDetails();
      }
      if (command === "icon-page-number") {
        iconPickerPage = Number(button.dataset.iconPageNumber) || 0;
        renderProjectDetails();
      }
      if (command === "add-copy-block") addCopyBlock();
      if (command === "toggle-copy-edit-mode") {
        copyBlocksEditing = !copyBlocksEditing;
        renderProjectDetails();
      }
      if (command === "toggle-block") toggleCopyBlock(blockId);
      if (command === "edit-block") editCopyBlock(blockId);
      if (command === "set-block-format") updateCopyBlock(blockId, "format", button.dataset.format);
      if (command === "move-copy-block") moveCopyBlock(blockId, button.dataset.direction);
      if (command === "delete-block") deleteCopyBlock(blockId);
      if (command === "copy-block") copyBlockContent(blockId);
      if (command === "add-note-block") addNoteBlock(button.dataset.noteType);
      if (command === "delete-note-block") deleteNoteBlock(button.dataset.noteId);
      if (command === "add-check-item") addCheckItem(button.dataset.noteId);
      if (command === "toggle-check-item") toggleCheckItem(button.dataset.noteId, button.dataset.checkId);
      if (command === "delete-check-item") deleteCheckItem(button.dataset.noteId, button.dataset.checkId);
      if (command === "expand-note") expandNote(button.dataset.noteId);
      if (command === "close-expanded-note") closeExpandedNote();
      if (command === "copy-note") copyNoteContent(button.dataset.noteId);
    });

    projectView.addEventListener("click", (event) => {
      const modal = event.target.closest("[data-modal='project-info']");
      if (event.target === modal) {
        closeProjectInfo();
      }

      const noteModal = event.target.closest("[data-modal='expanded-note']");
      if (event.target === noteModal) {
        closeExpandedNote();
      }
    });

    renderDashboardProjectCards();
  </script>
</body>
</html>
